<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ 타자연습 기록판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0f0f14; --surface:#1a1a24; --surface2:#22223a; --border:#2e2e48;
    --accent:#6c63ff; --accent2:#ff6584; --accent3:#43e97b; --accent4:#f7971e;
    --text:#e8e8f0; --text-muted:#888899;
    --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32; --pass:#43e97b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#2a2a3e; border:1px solid var(--border); color:var(--text);
    padding:10px 22px; border-radius:999px; font-size:0.85rem;
    z-index:9999; transition:transform 0.3s; pointer-events:none; white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.ok { border-color:var(--pass); color:var(--pass); }
  #toast.err { border-color:var(--accent2); color:var(--accent2); }

  /* LOADING */
  #loading-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index:8888; backdrop-filter:blur(3px);
  }
  #loading-overlay.hidden { display:none; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* HEADER */
  header {
    background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
    border-bottom:1px solid var(--border);
    padding:14px 24px; position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .header-title { display:flex; align-items:center; gap:12px; }
  .header-title h1 {
    font-family:'Space Mono',monospace; font-size:1.25rem; font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sync-status {
    font-size:0.73rem; padding:3px 10px; border-radius:999px;
    border:1px solid var(--border); color:var(--text-muted);
    display:flex; align-items:center; gap:5px;
  }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--border); }
  .sync-dot.connected { background:var(--pass); box-shadow:0 0 6px var(--pass); }

  /* BUTTONS */
  .btn {
    padding:7px 15px; border-radius:8px; border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:500; transition:all 0.2s;
  }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#5a52e0; transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--border); }
  .btn-danger { background:#cc3355; color:white; }
  .btn-danger:hover { background:#aa2244; }
  .btn-sm { padding:4px 10px; font-size:0.73rem; }

  /* MONTH BAR */
  .month-bar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:9px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .month-bar label { font-size:0.82rem; color:var(--text-muted); }
  .month-bar input[type=month], .month-bar select {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:5px 10px; border-radius:8px; font-family:'Space Mono',monospace; font-size:0.85rem;
  }

  /* TOP5 */
  #top5-section { background:linear-gradient(135deg,#1a1a2e,#12122a); border-bottom:2px solid var(--border); padding:16px 24px; }
  .section-title { font-size:0.73rem; font-weight:700; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; margin-bottom:11px; }
  .top5-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:11px; }
  .top5-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .top5-card-header { padding:8px 13px; font-size:0.77rem; font-weight:700; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
  .top5-card-header.korean { background:linear-gradient(90deg,#1e1b4b,#312e81); }
  .top5-card-header.english { background:linear-gradient(90deg,#1c3a5e,#1e3a8a); }
  .top5-card-header .badge { font-size:0.67rem; padding:2px 7px; border-radius:999px; background:rgba(255,255,255,0.15); margin-left:auto; }
  .top5-list { padding:5px 0; }
  .top5-item { display:flex; align-items:center; padding:5px 13px; gap:9px; transition:background 0.15s; cursor:pointer; }
  .top5-item:hover { background:var(--surface2); }
  .rank-badge { width:21px; height:21px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:0.67rem; font-weight:700; flex-shrink:0; }
  .rank-1 { background:var(--gold); color:#000; }
  .rank-2 { background:var(--silver); color:#000; }
  .rank-3 { background:var(--bronze); color:#fff; }
  .rank-4,.rank-5 { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .top5-name { flex:1; font-size:0.83rem; font-weight:500; }
  .top5-score { font-family:'Space Mono',monospace; font-size:0.83rem; color:var(--accent); font-weight:700; }

  /* AUTH */
  #auth-screen {
    position:fixed; inset:0; background:var(--bg); z-index:9000;
    display:flex; align-items:center; justify-content:center;
  }
  #auth-screen.hidden { display:none; }
  .auth-box {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:40px 36px; width:100%; max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .auth-logo {
    font-family:'Space Mono',monospace; font-size:1.4rem; font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-align:center; margin-bottom:6px;
  }
  .auth-sub { text-align:center; font-size:0.82rem; color:var(--text-muted); margin-bottom:28px; }
  .auth-tabs { display:flex; background:var(--surface2); border-radius:10px; padding:4px; gap:4px; margin-bottom:24px; }
  .auth-tab {
    flex:1; padding:8px; border:none; border-radius:7px; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:0.83rem; font-weight:700;
    background:transparent; color:var(--text-muted); transition:all 0.2s;
  }
  .auth-tab.active { background:var(--accent); color:white; }
  .auth-field { margin-bottom:16px; }
  .auth-field label { display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:6px; }
  .auth-field input {
    width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:10px 14px; border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:0.9rem;
    outline:none; transition:border-color 0.2s;
  }
  .auth-field input:focus { border-color:var(--accent); }
  .auth-submit {
    width:100%; padding:12px; background:var(--accent); color:white; border:none;
    border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; font-weight:700;
    cursor:pointer; transition:all 0.2s; margin-top:4px;
  }
  .auth-submit:hover { background:#5a52e0; transform:translateY(-1px); }
  .auth-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .auth-error { color:var(--accent2); font-size:0.8rem; margin-top:10px; text-align:center; min-height:18px; }
  .auth-info { background:rgba(108,99,255,0.1); border:1px solid rgba(108,99,255,0.3); border-radius:8px; padding:10px 14px; font-size:0.78rem; color:var(--text-muted); margin-bottom:16px; line-height:1.5; }
  .user-badge { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--text-muted); }
  .user-badge .email { color:var(--text); font-weight:500; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn { padding:4px 11px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; font-size:0.73rem; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; }
  .logout-btn:hover { border-color:var(--accent2); color:var(--accent2); }

  /* TREND */
















  /* MAIN LAYOUT */
  main { display:flex; min-height:calc(100vh - 200px); }

  /* ASIDE */
  aside {
    width:230px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
    overflow-y:auto; max-height:calc(100vh - 200px); position:sticky; top:200px;
  }

  /* DAY TABS */
  .day-tabs { display:flex; flex-direction:column; }
  .day-group { border-bottom:1px solid var(--border); }
  .day-tab-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 14px; cursor:pointer; font-size:0.8rem; font-weight:700;
    color:var(--text-muted); transition:all 0.15s; user-select:none;
    letter-spacing:1px;
  }
  .day-tab-header:hover { background:var(--surface2); color:var(--text); }
  .day-tab-header.open { color:var(--accent); background:rgba(108,99,255,0.08); }
  .day-tab-header
  .day-tab-header .day-arrow { font-size:0.7rem; transition:transform 0.2s; }
  .day-tab-header.open .day-arrow { transform:rotate(90deg); }
  .day-students { display:none; }
  .day-students.open { display:block; }
  .student-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 14px 7px 22px; cursor:pointer;
    border-left:3px solid transparent; transition:all 0.15s; font-size:0.84rem;
  }
  .student-item:hover { background:var(--surface2); }
  .student-item.active { background:rgba(108,99,255,0.15); border-left-color:var(--accent); color:var(--accent); font-weight:600; }
  .student-del { opacity:0; font-size:0.67rem; color:var(--accent2); cursor:pointer; padding:2px 4px; }
  .student-item:hover .student-del { opacity:1; }

  /* CLASS GROUP (요일 안 클래스 구분) */
  .class-group { border-top:1px solid rgba(46,46,72,0.7); }
  .class-group-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:5px 14px 5px 14px; font-size:0.73rem; font-weight:700;
    color:var(--accent4); letter-spacing:0.5px; cursor:pointer;
    background:rgba(247,151,30,0.06); transition:background 0.15s;
  }
  .class-group-header:hover { background:rgba(247,151,30,0.12); }
  .class-group-header .cg-arrow { font-size:0.65rem; transition:transform 0.2s; }
  .class-group-header.open .cg-arrow { transform:rotate(90deg); }
  .class-group-students { display:none; }
  .class-group-students.open { display:block; }
  .student-item.indented { padding-left:30px; }

  /* 요일 관리 버튼 (사이드바 하단) */
  .add-day-btn {
    display:flex; align-items:center; justify-content:center; gap:6px;
    margin:10px 12px; padding:8px; border:1px dashed var(--border);
    border-radius:9px; cursor:pointer; font-size:0.78rem; color:var(--text-muted);
    background:transparent; font-family:'Noto Sans KR',sans-serif;
    transition:all 0.15s;
  }
  .add-day-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,0.06); }
  .day-manage-btn {
    opacity:0; font-size:0.62rem; color:var(--text-muted); cursor:pointer;
    padding:1px 5px; border-radius:4px; border:1px solid transparent;
    transition:all 0.15s; white-space:nowrap;
  }
  .day-tab-header:hover .day-manage-btn { opacity:1; }
  .day-manage-btn:hover { border-color:var(--border); background:var(--surface2); }

  /* CONTENT */
  .content { flex:1; padding:20px 24px; overflow-y:auto; }
  .content-header { display:flex; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:8px; }
  .content-header h2 { font-size:1.25rem; font-weight:700; }

  .lang-tabs { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
  .lang-tab { flex:1; padding:9px; text-align:center; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.2s; color:var(--text-muted); }
  .lang-tab.active { background:var(--accent); color:white; }

  .category-section { margin-bottom:24px; }
  .category-title { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); font-weight:700; margin-bottom:11px; display:flex; align-items:center; gap:8px; }
  .category-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* JARI GRID - 한 줄로 */
  .jari-grid {
    display:grid;
    grid-template-columns:repeat(8, 1fr);
    gap:8px;
  }
  .jari-card {
    background:var(--surface); border:1px solid var(--border); border-radius:11px;
    padding:11px 8px; cursor:pointer; transition:all 0.2s; overflow:hidden; text-align:center;
  }
  .jari-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 16px rgba(108,99,255,0.15); }
  .jari-card.has-record { border-color:rgba(108,99,255,0.35); }
  .jari-card.has-pass { border-color:rgba(67,233,123,0.5); background:rgba(67,233,123,0.04); }
  .jari-card-label { font-size:0.58rem; color:var(--text-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:1px; }
  .jari-card-name { font-size:0.78rem; font-weight:700; margin-bottom:8px; line-height:1.3; }
  .jari-pass-row { display:flex; align-items:baseline; justify-content:center; gap:2px; margin-bottom:4px; }
  .pass-count { font-family:'Space Mono',monospace; font-size:1.2rem; font-weight:700; color:var(--pass); line-height:1; }
  .pass-denom { font-family:'Space Mono',monospace; font-size:0.72rem; color:var(--text-muted); }
  .pass-label { font-size:0.62rem; color:var(--text-muted); margin-left:1px; }
  .pass-bar-wrap { background:var(--surface2); border-radius:999px; height:3px; overflow:hidden; margin-bottom:6px; }
  .pass-bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--pass)); transition:width 0.4s; }
  .jari-card-best { font-family:'Space Mono',monospace; font-size:0.76rem; color:var(--accent); font-weight:700; }
  .jari-card-sub { font-size:0.6rem; color:var(--text-muted); margin-top:2px; }
  .jari-card-empty { font-size:0.66rem; color:var(--border); margin-top:4px; }

  /* STATS */
  .stats-summary { display:grid; grid-template-columns:repeat(3,1fr); background:var(--surface2); border:1px solid var(--border); border-radius:10px; margin-bottom:9px; overflow:hidden; }
  .stat-cell { padding:10px 13px; text-align:center; border-right:1px solid var(--border); }
  .stat-cell:last-child { border-right:none; }
  .stat-label { font-size:0.62rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
  .stat-value { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:700; line-height:1.2; }
  .stat-unit { font-size:0.62rem; color:var(--text-muted); font-family:'Noto Sans KR',sans-serif; }
  .best-val { color:var(--accent3); } .avg-val { color:var(--accent); } .acc-val { color:var(--accent4); }

  /* PRACTICE TABLE */
  .practice-table { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .pt-header { display:grid; grid-template-columns:115px 95px 95px 1fr 64px; padding:8px 15px; background:var(--surface2); font-size:0.67rem; color:var(--text-muted); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .pt-row { display:grid; grid-template-columns:115px 95px 95px 1fr 64px; padding:7px 13px; border-top:1px solid var(--border); align-items:center; transition:background 0.15s; }
  .pt-row:hover { background:var(--surface2); }
  .pt-row input { background:transparent; border:1px solid transparent; color:var(--text); font-family:'Space Mono',monospace; font-size:0.82rem; padding:3px 6px; border-radius:6px; transition:all 0.15s; width:85px; }
  .pt-row input:focus { outline:none; background:var(--surface2); border-color:var(--accent); }
  .pt-row input[type=date] { width:110px; font-family:'Noto Sans KR',sans-serif; font-size:0.75rem; }
  .pt-row input[type=text] { width:100%; font-family:'Noto Sans KR',sans-serif; font-size:0.75rem; }
  .pt-row input.is-best { color:var(--accent3); font-weight:700; }
  .table-footer { padding:8px 15px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:440px; max-width:calc(100vw - 32px); max-height:88vh; overflow-y:auto; transform:translateY(20px); transition:transform 0.2s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h3 { font-size:1.02rem; font-weight:700; margin-bottom:15px; }
  .form-group { margin-bottom:12px; }
  .form-group label { display:block; font-size:0.78rem; color:var(--text-muted); margin-bottom:4px; }
  .form-group input, .form-group select { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px 11px; border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:0.87rem; }
  .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
  .modal-actions { display:flex; gap:9px; margin-top:16px; }
  .modal-actions .btn { flex:1; }

  /* DAY CHECKBOX GROUP */
  .day-checkbox-group { display:flex; gap:8px; flex-wrap:wrap; margin-top:5px; }
  .day-cb-label {
    display:flex; align-items:center; justify-content:center;
    width:40px; height:36px; border-radius:8px; border:1.5px solid var(--border);
    cursor:pointer; font-size:0.82rem; font-weight:700; transition:all 0.15s; color:var(--text-muted);
  }
  .day-cb-label:has(input:checked) { border-color:var(--accent); background:rgba(108,99,255,0.18); color:var(--accent); }
  .day-cb-label input[type=checkbox] { display:none; }

  /* PASS RADIO */
  .pass-radio-group { display:flex; gap:9px; margin-top:5px; }
  .pass-radio-label { display:flex; align-items:center; justify-content:center; gap:6px; cursor:pointer; font-size:0.87rem; padding:7px 13px; border-radius:8px; border:1.5px solid var(--border); transition:all 0.15s; flex:1; }
  .pass-radio-label:has(input:checked).pass-opt { border-color:var(--pass); background:rgba(67,233,123,0.1); color:var(--pass); font-weight:700; }
  .pass-radio-label:has(input:checked).fail-opt { border-color:var(--accent2); background:rgba(255,101,132,0.08); color:var(--accent2); font-weight:700; }
  .pass-radio-label input[type=radio] { width:auto; }

  /* JARI HISTORY */
  .jari-history-wrap { margin-top:16px; border-top:1px solid var(--border); padding-top:13px; }
  .jari-history-title { font-size:0.69rem; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:7px; }
  .jari-history-item { display:grid; grid-template-columns:86px 74px 54px 68px 32px; align-items:center; padding:6px 9px; border-radius:8px; background:var(--surface2); margin-bottom:4px; font-size:0.77rem; gap:5px; }
  .h-date { color:var(--text-muted); font-size:0.71rem; }
  .h-speed { font-family:'Space Mono',monospace; color:var(--accent); font-weight:700; }
  .h-acc { color:var(--accent4); }
  .h-pass.pass { color:var(--pass); font-weight:700; }
  .h-pass.fail { color:var(--accent2); }
  .h-del { color:var(--accent2); cursor:pointer; font-size:0.65rem; opacity:0.4; text-align:center; }
  .h-del:hover { opacity:1; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .empty-state .icon { font-size:3rem; margin-bottom:12px; }
  .empty-state p { font-size:0.88rem; }



  /* EDIT DAY BUTTON */
  .edit-day-btn {
    font-size:0.7rem; padding:2px 8px; border-radius:6px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--text-muted); cursor:pointer; margin-left:6px;
    transition:all 0.15s; white-space:nowrap;
  }
  .edit-day-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* COMBINED PRACTICE TABLE */
  .combined-practice { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:20px; }

<script>
const SUPABASE_URL = 'https://awsvbgezyhwuwavhsrho.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HVqQwIJ2hyYxQc-P63lIig_VZiPkq5P';
let sb;
try {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  console.error('Supabase init error:', e);
}

const JARI_STAGES = [
  {id:'basic',name:'기본자리'},{id:'left_top',name:'왼손 윗자리'},
  {id:'left_bot',name:'왼손 아랫자리'},{id:'center',name:'가운데자리'},
  {id:'right_top',name:'오른손 윗자리'},{id:'right_bot',name:'오른손 아랫자리'},
  {id:'all',name:'전체자리'},{id:'number',name:'숫자자리'},
];
const OTHER_TYPES = [
  {id:'word',name:'낱말 연습'},{id:'short',name:'단문 연습'},{id:'long',name:'장문 연습'},
];
// DAYS: localStorage로 동적 관리 (기본값 월~토)
// dayClasses: { '월': ['A반','B반'], '화': [] } — 클래스 이름 목록
let DAYS = ['월','화','수','목','금','토'];
let dayClasses = {}; // 요일별 클래스 목록
let openClasses = new Set(); // 열린 클래스 그룹 키 (day+class)

function loadDaysConfig(){
  try{
    const saved = localStorage.getItem('days_config');
    if(saved){ const p=JSON.parse(saved); DAYS=p.days||DAYS; dayClasses=p.classes||{}; }
    DAYS.forEach(d=>{ if(!dayClasses[d]) dayClasses[d]=[]; });
  }catch(e){}
}
function saveDaysConfig(){
  localStorage.setItem('days_config', JSON.stringify({days:DAYS, classes:dayClasses}));
}
// 학생별 클래스 배정 — localStorage
function saveClassMap(stuId, map){
  const all=JSON.parse(localStorage.getItem('class_maps')||'{}');
  all[stuId]=map;
  localStorage.setItem('class_maps',JSON.stringify(all));
}
function loadClassMap(stuId){
  try{ return JSON.parse(localStorage.getItem('class_maps')||'{}')[stuId]||{}; }catch(e){return{};}
}

let students=[], records=[];
let selectedStudentId=null, selectedLang='korean', jariContext=null;
let openDays=new Set(); // 열린 요일 그룹

// ── UI HELPERS ──
function showLoading(){document.getElementById('loading-overlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}
let toastTimer;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='',2500);
}
function setConnected(ok){
  document.getElementById('sync-dot').className='sync-dot'+(ok?' connected':'');
  document.getElementById('sync-text').textContent=ok?'실시간 연결됨':'연결 끊김';
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});
});

// ── AUTH ──
let currentUser=null;
let authMode='login';

function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup'));
  });
  document.getElementById('auth-btn').textContent=mode==='login'?'로그인':'회원가입';
  document.getElementById('auth-pw2-field').style.display=mode==='signup'?'block':'none';
  document.getElementById('auth-info-box').textContent=mode==='login'
    ?'학원 원장/강사만 계정을 만들 수 있습니다. 로그인 후 학생 기록을 관리하세요.'
    :'회원가입 후 이메일 인증이 필요할 수 있습니다.';
  document.getElementById('auth-error').textContent='';
}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const pw2=document.getElementById('auth-pw2').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-btn');
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력하세요.';return;}
  if(authMode==='signup'&&pw!==pw2){errEl.textContent='비밀번호가 일치하지 않습니다.';return;}
  if(authMode==='signup'&&pw.length<6){errEl.textContent='비밀번호는 6자 이상이어야 합니다.';return;}
  btn.disabled=true; errEl.textContent='';
  try{
    let result;
    if(authMode==='login'){
      result=await sb.auth.signInWithPassword({email,password:pw});
    } else {
      result=await sb.auth.signUp({email,password:pw});
    }
    if(result.error) throw result.error;
    if(authMode==='signup'&&!result.data?.session){
      errEl.style.color='var(--pass)';
      errEl.textContent='가입 완료! 이메일 인증 후 로그인해주세요.';
      switchAuthTab('login');
    }
    // 세션이 생기면 onAuthStateChange가 처리
  } catch(e){
    const msg=e.message||'오류가 발생했습니다.';
    errEl.style.color='var(--accent2)';
    errEl.textContent=
      msg.includes('Invalid login')?'이메일 또는 비밀번호가 틀렸습니다.':
      msg.includes('already registered')?'이미 등록된 이메일입니다.':
      msg.includes('Email not confirmed')?'이메일 인증이 필요합니다.':msg;
  }
  btn.disabled=false;
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('user-email-display').textContent='';
  document.getElementById('auth-screen').classList.remove('hidden');
  students=[]; records=[];
  document.getElementById('main-content').innerHTML='<div class="empty-state"><div class="icon">👈</div><p>왼쪽에서 학생을 선택하거나 추가하세요</p></div>';
  document.getElementById('day-tabs').innerHTML='';
  document.getElementById('top5-grid').innerHTML='';
  toast('로그아웃되었습니다.');
}

// ── INIT ──
let appInitialized = false; // 최초 1회만 초기화

window.onload=async()=>{
  // DAYS 설정 먼저 로드 (auth 전에도 필요)
  loadDaysConfig();
  const now=new Date();
  document.getElementById('selected-month').value=
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Auth 상태 감지 — SIGNED_IN 이벤트만 처리, TOKEN_REFRESHED 등 무시
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN' && session?.user && !appInitialized){
      appInitialized=true;
      currentUser=session.user;
      document.getElementById('user-email-display').textContent=session.user.email;
      document.getElementById('auth-screen').classList.add('hidden');
      await loadAll();
      setupRealtime();
    }
    if(event==='SIGNED_OUT'){
      appInitialized=false;
    }
    // TOKEN_REFRESHED, USER_UPDATED 등은 완전히 무시 → 스피너 없음
  });

  // 이미 로그인 세션 있으면 바로 진입
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user && !appInitialized){
    appInitialized=true;
    currentUser=session.user;
    document.getElementById('user-email-display').textContent=session.user.email;
    document.getElementById('auth-screen').classList.add('hidden');
    await loadAll();
    setupRealtime();
  } else if(!session){
    document.getElementById('auth-screen').classList.remove('hidden');
    hideLoading();
  }
};

async function loadAll(){
  showLoading();
  try{
    const[{data:sd,error:se},{data:rd,error:re}]=await Promise.all([
      sb.from('students').select('*').order('created_at'),
      sb.from('records').select('*').order('date',{ascending:false})
    ]);
    if(se)throw se; if(re)throw re;
    students=(sd||[]).map(s=>{
      const cm=loadClassMap(s.id);
      return{...s,class_map:cm};
    });
    records=rd||[];
    setConnected(true); renderAll();
  }catch(e){
    const msg = e?.message || e?.error_description || JSON.stringify(e) || '알 수 없는 오류';
    toast('로드 실패: '+msg,'err');
    console.error('loadAll error:', e);
    setConnected(false);
  }
  finally{hideLoading();}
}

function setupRealtime(){
  sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},async()=>{
      const{data}=await sb.from('students').select('*').order('created_at');
      if(data){students=data;renderSidebar();renderTop5();}
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'records'},async()=>{
      const{data}=await sb.from('records').select('*').order('date',{ascending:false});
      if(data){
        records=data;renderTop5();
        if(selectedStudentId)renderStudentDetails();
        if(jariContext)renderJariHistory();
      }
    })
    .subscribe(s=>setConnected(s==='SUBSCRIBED'));
}

function renderAll(){renderSidebar();renderTop5();if(selectedStudentId)renderStudentContent();}



// ── SIDEBAR (요일별 그룹 + 클래스 그룹) ──
function renderSidebar(){
  const container=document.getElementById('day-tabs');

  const dayGroups={};
  DAYS.forEach(d=>dayGroups[d]=[]);
  dayGroups['기타']=[];

  students.forEach(stu=>{
    const days=(stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
    if(!days.length){dayGroups['기타'].push(stu);return;}
    days.forEach(d=>{
      if(dayGroups[d])dayGroups[d].push(stu);
      else dayGroups['기타'].push(stu);
    });
  });

  const allDayKeys=[...DAYS,'기타'];

  let html = allDayKeys.map(day=>{
    const stuList=[...new Map(dayGroups[day].map(s=>[s.id,s])).values()]
      .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

    // 기타는 학생 없으면 숨김, 추가된 요일은 학생 없어도 항상 표시
    if(day==='기타' && !stuList.length) return '';

    const isOpen=openDays.has(day);
    const classes = (dayClasses[day]||[]);
    const dayLabel = day==='기타' ? '기타' : day+'요일';

    let studentsHtml = '';
    if(!stuList.length){
      studentsHtml = '<div style="padding:8px 14px;font-size:0.78rem;color:var(--border)">학생 없음</div>';
    } else if(classes.length === 0){
      studentsHtml = stuList.map(s=>studentItemHtml(s)).join('');
    } else {
      classes.forEach(cls=>{
        const clsKey = day+'::'+cls;
        const clsStudents = stuList.filter(s=>(s.class_map||{})[day]===cls);
        const isClsOpen = openClasses.has(clsKey);
        studentsHtml += `
          <div class="class-group">
            <div class="class-group-header ${isClsOpen?'open':''}" onclick="toggleClass('${clsKey}')">
              <span>📌 ${cls}</span>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:0.65rem;color:var(--text-muted)">${clsStudents.length}명</span>
                <span class="cg-arrow">▶</span>
                <span onclick="event.stopPropagation();renameClass('${day}','${cls}')" title="클래스 이름 변경" style="font-size:0.65rem;color:var(--text-muted);cursor:pointer;padding:2px 5px;border-radius:3px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">✏️</span>
                <span onclick="event.stopPropagation();deleteClass('${day}','${cls}')" title="클래스 삭제" style="font-size:0.65rem;color:var(--accent2);cursor:pointer;padding:2px 5px;border-radius:3px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">✕</span>
              </div>
            </div>
            <div class="class-group-students ${isClsOpen?'open':''}">
              ${clsStudents.length ? clsStudents.map(s=>studentItemHtml(s,true)).join('') : '<div style="padding:6px 14px 6px 30px;font-size:0.75rem;color:var(--border)">학생 없음</div>'}
            </div>
          </div>`;
      });
      const unassigned = stuList.filter(s=>!classes.includes((s.class_map||{})[day]));
      if(unassigned.length){
        studentsHtml += `<div style="padding:4px 14px 2px;font-size:0.65rem;color:var(--text-muted);border-top:1px solid rgba(46,46,72,0.5)">미배정</div>`;
        studentsHtml += unassigned.map(s=>studentItemHtml(s,true)).join('');
      }
    }

    // 요일 바에는 화살표만 — ＋반/삭제 버튼 없음
    return `
    <div class="day-group">
      <div class="day-tab-header ${isOpen?'open':''}" onclick="toggleDay('${day}')">
        <span>${dayLabel}</span>
        <span class="day-arrow">▶</span>
      </div>
      <div class="day-students ${isOpen?'open':''}">
        ${studentsHtml}
      </div>
    </div>`;
  }).join('');

  // 하단 버튼: 요일 추가 + 클래스 추가
  html += `
    <button class="add-day-btn" onclick="openAddDayModal()">＋ 요일 추가</button>
    <button class="add-day-btn" onclick="openAddClassModal()" style="border-color:rgba(247,151,30,0.4);color:var(--accent4)">＋ 클래스 추가</button>
  `;
  container.innerHTML = html;
}

function studentItemHtml(s, indented=false){
  return `<div class="student-item ${indented?'indented':''} ${s.id===selectedStudentId?'active':''}" onclick="selectStudent('${s.id}')">
    <span>${s.name}</span>
    <span class="student-del" onclick="deleteStudent(event,'${s.id}')">✕</span>
  </div>`;
}

function toggleClass(key){
  if(openClasses.has(key))openClasses.delete(key);
  else openClasses.add(key);
  renderSidebar();
}

function toggleDay(day){
  if(openDays.has(day))openDays.delete(day);
  else openDays.add(day);
  renderSidebar();
}

// ── 요일 추가/삭제 ──
function openAddDayModal(){
  document.getElementById('new-day-name').value='';
  openModal('add-day-modal');
  setTimeout(()=>document.getElementById('new-day-name').focus(),100);
}
function addDay(){
  const name=document.getElementById('new-day-name').value.trim();
  if(!name)return;
  if(DAYS.includes(name))return alert('이미 있는 요일입니다.');
  DAYS.push(name);
  if(!dayClasses[name]) dayClasses[name]=[];
  saveDaysConfig();
  closeModal('add-day-modal');
  // 학생 추가/수정 모달 체크박스 갱신
  refreshDayCheckboxes();
  openDays.add(name);
  renderSidebar();
  toast(name+'요일 추가됨 ✓');
}
function deleteDay(day){
  if(!confirm(`"${day}요일"을 삭제하시겠습니까?
해당 요일에 배정된 학생들은 "기타"로 이동합니다.`))return;
  DAYS=DAYS.filter(d=>d!==day);
  delete dayClasses[day];
  saveDaysConfig();
  // 학생 days 필드에서 해당 요일 제거
  students.forEach(s=>{
    const days=(s.days||'').split(',').map(d=>d.trim()).filter(d=>d&&d!==day);
    s.days=days.join(',');
    sb.from('students').update({days:s.days}).eq('id',s.id);
  });
  refreshDayCheckboxes();
  renderSidebar();
  toast(day+'요일 삭제됨');
}

// ── 클래스 추가/삭제/수정 ──
function openAddClassModal(){
  // 클래스 추가 모달 — 요일 체크박스 + 클래스 이름
  const wrap=document.getElementById('add-class-day-wrap');
  if(wrap) wrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="add-class-days" value="${d}"> ${d}
    </label>`).join('');
  document.getElementById('new-class-name').value='';
  openModal('add-class-modal');
  setTimeout(()=>document.getElementById('new-class-name').focus(),100);
}
function addClassConfirm(){
  const name=document.getElementById('new-class-name').value.trim();
  if(!name){alert('클래스 이름을 입력하세요.');return;}
  const checked=[...document.querySelectorAll('input[name="add-class-days"]:checked')].map(cb=>cb.value);
  if(!checked.length){alert('요일을 1개 이상 선택하세요.');return;}
  let added=[];
  checked.forEach(d=>{
    if(!dayClasses[d]) dayClasses[d]=[];
    if(!dayClasses[d].includes(name)){
      dayClasses[d].push(name);
      openDays.add(d);
      openClasses.add(d+'::'+name);
      added.push(d);
    }
  });
  saveDaysConfig();
  closeModal('add-class-modal');
  renderSidebar();
  if(added.length) toast(`${added.join('·')}요일에 "${name}" 추가됨 ✓`);
  else toast('이미 있는 클래스입니다.','err');
}
function addClassToDay(day){
  // 요일 헤더 버튼에서 호출 — 해당 요일 미리 체크
  openAddClassModal();
  setTimeout(()=>{
    document.querySelectorAll('input[name="add-class-days"]').forEach(cb=>{
      cb.checked=(cb.value===day);
    });
  },120);
}
function renameClass(day,oldName){
  const newName=prompt(`클래스 이름 변경`, oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const n=newName.trim();
  dayClasses[day]=dayClasses[day].map(c=>c===oldName?n:c);
  // 학생 class_map도 업데이트
  students.forEach(s=>{
    if((s.class_map||{})[day]===oldName){
      s.class_map[day]=n;
      const memo=JSON.stringify(s.class_map);
      sb.from('students').update({memo}).eq('id',s.id);
    }
  });
  saveDaysConfig();
  renderSidebar();
  toast('클래스 이름 변경됨');
}
function deleteClass(day,cls){
  if(!confirm(`"${cls}"를 삭제하시겠습니까?
해당 클래스 학생들은 "미배정"으로 이동합니다.`))return;
  dayClasses[day]=dayClasses[day].filter(c=>c!==cls);
  students.forEach(s=>{
    if((s.class_map||{})[day]===cls){
      delete s.class_map[day];
      const memo=JSON.stringify(s.class_map);
      sb.from('students').update({memo}).eq('id',s.id);
    }
  });
  saveDaysConfig();
  renderSidebar();
  toast('클래스 삭제됨');
}

// 학생 모달 체크박스를 현재 DAYS에 맞게 갱신 (id 기반)
function refreshDayCheckboxes(){
  const newWrap=document.getElementById('new-days-wrap');
  if(newWrap) newWrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="new-days" value="${d}" onchange="updateClassSelects('new')"> ${d}
    </label>`).join('');
  const editWrap=document.getElementById('edit-days-wrap');
  if(editWrap) editWrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="edit-days" value="${d}" onchange="updateClassSelects('edit')"> ${d}
    </label>`).join('');
}

// ── STUDENT ACTIONS ──
function selectStudent(id){
  selectedStudentId=id;
  // 해당 학생이 속한 요일 자동 열기
  const stu=students.find(s=>s.id===id);
  if(stu){
    const days=(stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
    if(days.length)days.forEach(d=>openDays.add(d));
    else openDays.add('기타');
  }
  renderSidebar();
  renderStudentContent();
}

async function deleteStudent(e,id){
  e.stopPropagation();
  if(!confirm('정말 삭제하시겠습니까?'))return;
  showLoading();
  const{error}=await sb.from('students').delete().eq('id',id);
  hideLoading();
  if(error)return toast('삭제 실패: '+error.message,'err');
  students=students.filter(s=>s.id!==id);
  records=records.filter(r=>r.student_id!==id);
  if(selectedStudentId===id){
    selectedStudentId=null;
    document.getElementById('main-content').innerHTML=
      `<div class="empty-state"><div class="icon">👈</div><p>왼쪽에서 학생을 선택하거나 추가하세요</p></div>`;
  }
  renderSidebar();renderTop5();
  toast('학생 삭제됨');
}

function renderDayCheckboxes(prefix, checkedDays=[], classMaps={}){
  const wrap=document.getElementById(prefix+'-days-wrap');
  if(!wrap)return;
  wrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="${prefix}-days" value="${d}"
        ${checkedDays.includes(d)?'checked':''}
        onchange="updateClassSelects('${prefix}')">
      ${d}
    </label>`).join('');
  updateClassSelects(prefix, classMaps);
}
function updateClassSelects(prefix, classMaps={}){
  const selWrap=document.getElementById(prefix+'-class-selects');
  if(!selWrap)return;
  const checked=[...document.querySelectorAll(`input[name="${prefix}-days"]:checked`)].map(cb=>cb.value);
  selWrap.innerHTML=checked.map(d=>{
    const classes=dayClasses[d]||[];
    if(!classes.length)return '';
    const cur=classMaps[d]||'';
    return `<div class="form-group" style="margin-bottom:8px">
      <label style="font-size:0.78rem;color:var(--text-muted)">${d}요일 클래스 <span style="color:var(--text-muted);font-size:0.7rem">(선택)</span></label>
      <select id="${prefix}-class-sel-${d}"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem">
        <option value="">— 클래스 미배정</option>
        ${classes.map(c=>`<option value="${c}" ${cur===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>`;
  }).join('');
}
function openAddStudentModal(){
  document.getElementById('new-student-name').value='';
  renderDayCheckboxes('new');
  openModal('add-student-modal');
  setTimeout(()=>document.getElementById('new-student-name').focus(),100);
}

async function addStudent(){
  const name=document.getElementById('new-student-name').value.trim();
  if(!name)return alert('이름을 입력하세요');
  const checked=[...document.querySelectorAll('input[name="new-days"]:checked')].map(cb=>cb.value);
  const days=checked.join(',');
  // 클래스 선택 수집 (로컬 저장)
  const class_map={};
  checked.forEach(d=>{
    const sel=document.getElementById('new-class-sel-'+d);
    if(sel&&sel.value) class_map[d]=sel.value;
  });
  const id='stu_'+Date.now();
  showLoading();
  // Supabase에는 id,name,days만 저장 (memo 컬럼 없음)
  const{error}=await sb.from('students').insert({id,name,days});
  hideLoading();
  if(error)return toast('추가 실패: '+error.message,'err');
  // class_map은 localStorage에 저장
  saveClassMap(id, class_map);
  const stu={id,name,days,class_map};
  students.push(stu);
  closeModal('add-student-modal');
  if(checked.length)checked.forEach(d=>{openDays.add(d); if(class_map[d])openClasses.add(d+'::'+class_map[d]);});
  else openDays.add('기타');
  renderSidebar();
  selectStudent(id);
  toast(`${name} 추가됨 ✓`);
}

// ── STUDENT CONTENT ──
function renderStudentContent(){
  const stu=students.find(s=>s.id===selectedStudentId);
  if(!stu)return;

  const stuDaysLabel=(stu.days||'').split(',').filter(Boolean).join('·')||'요일없음';
  document.getElementById('main-content').innerHTML=`
    <div class="content-header">
      <h2>📋 ${stu.name}
        <button class="edit-day-btn" onclick="openEditStudentModal('${stu.id}')">✏️ ${stuDaysLabel} 수정</button>
      </h2>
    </div>
    <div class="lang-tabs">
      <div class="lang-tab ${selectedLang==='korean'?'active':''}" onclick="switchLang('korean')">🇰🇷 한글</div>
      <div class="lang-tab ${selectedLang==='english'?'active':''}" onclick="switchLang('english')">🇺🇸 영어</div>
    </div>
    <div id="student-details"></div>`;
  renderStudentDetails();
}

function switchLang(lang){selectedLang=lang;renderStudentContent();}

function renderStudentDetails(){
  const container=document.getElementById('student-details');
  if(!container)return;

  // ── 자리 연습 ──
  let html=`<div class="category-section">
    <div class="category-title">🖐 자리 연습</div>
    <div class="jari-grid">`;

  JARI_STAGES.forEach(stage=>{
    const recs=records.filter(r=>r.student_id===selectedStudentId&&r.lang===selectedLang&&r.type==='jari'&&r.stage_id===stage.id);
    const passCount=recs.filter(r=>!!r.passed).length;
    const totalCount=recs.length;
    const hasPass=passCount>0;
    const speedRecs=recs.filter(r=>r.speed);
    const best=speedRecs.length?speedRecs.reduce((a,b)=>b.speed>a.speed?b:a):null;
    const barPct=totalCount?Math.round(passCount/totalCount*100):0;
    html+=`
    <div class="jari-card ${totalCount?'has-record':''} ${hasPass?'has-pass':''}" onclick="openJariModal('${stage.id}','${stage.name}')">
      <div class="jari-card-label">자리</div>
      <div class="jari-card-name">${stage.name}</div>
      ${totalCount>0?`
        <div class="jari-pass-row"><span class="pass-count">${passCount}</span><span class="pass-denom">/${totalCount}</span></div>
        <div class="pass-bar-wrap"><div class="pass-bar-fill" style="width:${barPct}%"></div></div>
        ${best?`<div class="jari-card-best">${best.speed}<span class="stat-unit">타</span></div>
        <div class="jari-card-sub">${best.accuracy||'-'}% · ${best.date||''}</div>`:''}
      `:`<div class="jari-card-empty">클릭해서 추가</div>`}
    </div>`;
  });
  html+=`</div></div>`;

  // ── 낱말/단문/장문 통합 테이블 ──
  const typeData=OTHER_TYPES.map(type=>{
    const recs=records.filter(r=>
      r.student_id===selectedStudentId && r.lang===selectedLang && r.type===type.id
    ).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const speeds=recs.filter(r=>r.speed>0).map(r=>r.speed);
    const globalBest=speeds.length?Math.max(...speeds):null;
    return{type,recs,globalBest};
  });

  // COL: 날짜(100) | 낱말평균속도(90) 낱말최고타수(90) | 단문(90)(90) | 장문(90)(90) | 삭제(32)
  // 전체최고기록/헤더/데이터행 모두 동일한 COL 사용 → 정렬 일치
  const COL = 'grid-template-columns:100px repeat(6,1fr) 32px';
  const MINW = 'min-width:600px';

  html+=`<div class="category-section">
    <div class="category-title">✏️ 낱말 · 단문 · 장문 연습</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto">

      <!-- 전체 최고기록: grid로 정확히 COL에 맞춤 -->
      <div style="display:grid;${COL};background:var(--surface2);border-bottom:2px solid var(--border);${MINW}">
        <div style="padding:8px 10px;font-size:0.65rem;color:var(--text-muted);font-weight:700;border-right:1px solid var(--border);display:flex;align-items:center">전체<br>최고기록</div>
        ${typeData.flatMap((d,i)=>[
          `<div style="padding:8px 6px 8px 8px;border-right:1px solid rgba(108,99,255,0.2)">
            <div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:2px">${d.type.name}</div>
            <div style="font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;color:var(--accent3)">${d.globalBest??'--'}<span style="font-size:0.58rem;color:var(--text-muted)"> 타</span></div>
          </div>`,
          `<div style="padding:8px 6px;${i<2?'border-right:1px solid var(--border)':''}">
            <div style="font-size:0.62rem;color:var(--text-muted);margin-bottom:2px">최고타수</div>
            <div style="font-family:'Space Mono',monospace;font-size:0.95rem;color:var(--text-muted)">--</div>
          </div>`
        ]).join('')}
        <div></div>
      </div>

      <!-- 1단 헤더: 날짜 | 낱말(90+90=span2) | 단문 | 장문 -->
      <div style="display:grid;${COL};background:rgba(0,0,0,0.22);border-bottom:1px solid rgba(108,99,255,0.3);${MINW}">
        <div style="padding:6px 8px;font-size:0.63rem;color:var(--text-muted);font-weight:700;border-right:1px solid var(--border)">날짜</div>
        ${typeData.flatMap((d,i)=>[
          `<div style="padding:6px 6px;font-size:0.72rem;font-weight:700;color:var(--accent);text-align:center;border-right:1px solid rgba(108,99,255,0.15);grid-column:span 1">${d.type.name}</div>`,
          `<div style="padding:6px 6px;font-size:0.72rem;font-weight:700;color:var(--accent);text-align:center;${i<2?'border-right:1px solid var(--border)':''}">${d.type.name}</div>`
        ]).join('')}
        <div></div>
      </div>

      <!-- 2단 헤더: 평균속도 | 최고타수 반복 -->
      <div style="display:grid;${COL};background:rgba(0,0,0,0.12);border-bottom:1px solid var(--border);${MINW}">
        <div style="border-right:1px solid var(--border)"></div>
        ${typeData.flatMap((d,i)=>[
          '<div style="padding:4px 6px;font-size:0.6rem;color:var(--text-muted);border-right:1px solid rgba(108,99,255,0.2)">평균속도</div>',
          `<div style="padding:4px 6px;font-size:0.6rem;color:var(--text-muted);${i<2?'border-right:1px solid var(--border)':''}">최고타수</div>`
        ]).join('')}
        <div></div>
      </div>`;

  // 모든 날짜 수집 (최신순)
  const allDates=[...new Set(
    typeData.flatMap(d=>d.recs.map(r=>r.date||'')).filter(Boolean)
  )].sort((a,b)=>b.localeCompare(a));

  const inpStyle=(id,field,isBest)=>
    `type="number" style="width:100%;background:transparent;border:1px solid transparent;color:${isBest?'var(--accent3)':'var(--text)'};font-family:'Space Mono',monospace;font-size:0.8rem;padding:3px 5px;border-radius:5px;transition:all 0.15s;${isBest?'font-weight:700;':''}"
     onfocus="this.style.background='var(--surface2)';this.style.borderColor='var(--accent)'"
     onblur="this.style.background='transparent';this.style.borderColor='transparent'"
     onchange="updateRecord('${id}','${field}',this.value)"
     onkeydown="tabNext(event,this)"`;

  allDates.forEach(date=>{
    const rowsByType=typeData.map(d=>d.recs.filter(r=>r.date===date));
    const maxR=Math.max(...rowsByType.map(r=>r.length),1);
    for(let ri=0;ri<maxR;ri++){
      const rowIds=rowsByType.map(recs=>recs[ri]?.id).filter(Boolean);
      html+=`<div style="display:grid;${COL};border-top:1px solid var(--border);align-items:center;${MINW};transition:background 0.1s" onmouseenter="this.style.background='rgba(108,99,255,0.04)'" onmouseleave="this.style.background=''">`;
      // 날짜 셀
      html+=`<div style="padding:4px 8px;font-family:'Space Mono',monospace;font-size:0.72rem;border-right:1px solid var(--border);color:var(--text-muted);white-space:nowrap">
        ${ri===0?date:''}
      </div>`;
      // 타입별 2열씩
      typeData.forEach((d,ti)=>{
        const r=rowsByType[ti][ri];
        const lastType=ti===2;
        if(r){
          html+=`<input value="${r.speed??''}" placeholder="평균속도"
            ${inpStyle(r.id,'speed',r.speed&&r.speed===d.globalBest)}
            style="width:100%;background:transparent;border:1px solid transparent;color:${r.speed&&r.speed===d.globalBest?'var(--accent3)':'var(--text)'};font-family:'Space Mono',monospace;font-size:0.8rem;padding:3px 5px;border-radius:5px;transition:all 0.15s;${r.speed&&r.speed===d.globalBest?'font-weight:700;':''}border-right:1px solid rgba(108,99,255,0.2)"
            onfocus="this.style.background='var(--surface2)';this.style.borderColor='var(--accent)'"
            onblur="this.style.background='transparent';this.style.borderColor='transparent'"
            onchange="updateRecord('${r.id}','speed',this.value)"
            onkeydown="tabNext(event,this)">
          <input value="${r.accuracy??''}" placeholder="최고타수"
            type="number"
            style="width:100%;background:transparent;border:1px solid transparent;color:var(--text);font-family:'Space Mono',monospace;font-size:0.8rem;padding:3px 5px;border-radius:5px;transition:all 0.15s;border-right:${lastType?'none':'1px solid var(--border)'};"
            onfocus="this.style.background='var(--surface2)';this.style.borderColor='var(--accent)'"
            onblur="this.style.background='transparent';this.style.borderColor='transparent'"
            onchange="updateRecord('${r.id}','accuracy',this.value)"
            onkeydown="tabNext(event,this)">`;
        } else {
          html+=`<div style="border-right:1px solid rgba(108,99,255,0.2)"></div>
                 <div style="border-right:${ti<2?'1px solid var(--border)':'none'}"></div>`;
        }
      });
      // 삭제
      html+=`<div style="display:flex;align-items:center;justify-content:center">
        ${rowIds.length?`<button onclick="${rowIds.map(id=>`deleteRecord('${id}')`).join(';')}"
          style="padding:2px 5px;background:#cc3355;border:none;color:white;border-radius:4px;cursor:pointer;font-size:0.65rem;line-height:1.4">✕</button>`:''}
      </div>`;
      html+=`</div>`;
    }
  });

  if(!allDates.length){
    html+=`<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.83rem;border-top:1px solid var(--border)">기록 없음 — 아래 버튼으로 추가하세요</div>`;
  }

  // 추가 버튼 행 — COL과 동일한 8열 grid
  html+=`<div style="display:grid;${COL};border-top:1px solid var(--border);background:rgba(0,0,0,0.1);${MINW}">
    <div style="padding:8px 10px;font-size:0.68rem;color:var(--text-muted);border-right:1px solid var(--border);display:flex;align-items:center">+ 행 추가</div>
    ${typeData.flatMap((d,i)=>[
      `<div style="padding:6px 6px 6px 6px;border-right:1px solid rgba(108,99,255,0.2);display:flex;align-items:center"><button class="btn btn-secondary btn-sm" onclick="addOtherRecord('${d.type.id}')">+ ${d.type.name}</button></div>`,
      `<div style="${i<2?'border-right:1px solid var(--border)':''}"></div>`
    ]).join('')}
    <div></div>
  </div>
  </div></div>`;

  container.innerHTML=html;
}

// ── RECORDS ──
async function addOtherRecord(typeId){
  const id='rec_'+Date.now();
  const today=new Date().toISOString().split('T')[0];
  const rec={id,student_id:selectedStudentId,lang:selectedLang,type:typeId,stage_id:null,speed:null,accuracy:null,memo:'',date:today,passed:false};
  const{error}=await sb.from('records').insert(rec);
  if(error)return toast('추가 실패: '+error.message,'err');
  records.unshift(rec); renderStudentDetails();
}

const debounceMap={};
async function updateRecord(id,field,value){
  const rec=records.find(r=>r.id===id);
  if(!rec)return;
  if(field==='speed'||field==='accuracy')rec[field]=value?Number(value):null;
  else rec[field]=value;
  clearTimeout(debounceMap[id+field]);
  debounceMap[id+field]=setTimeout(async()=>{
    const{error}=await sb.from('records').update({[field]:rec[field]}).eq('id',id);
    if(error)toast('저장 실패','err');
    else{renderStudentDetails();renderTop5();}
  },600);
}

async function deleteRecord(id){
  const{error}=await sb.from('records').delete().eq('id',id);
  if(error)return toast('삭제 실패','err');
  records=records.filter(r=>r.id!==id);
  renderStudentDetails();renderTop5();toast('기록 삭제됨');
}

// ── JARI MODAL ──
function openJariModal(stageId,stageName){
  jariContext={studentId:selectedStudentId,lang:selectedLang,stageId};
  document.getElementById('jari-modal-title').textContent=`✋ ${stageName}`;
  document.getElementById('jari-speed').value='';
  document.getElementById('jari-accuracy').value='';
  document.getElementById('jari-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('jari-pass-no').checked=true;
  renderJariHistory();
  openModal('jari-modal');
  setTimeout(()=>document.getElementById('jari-speed').focus(),120);
}

function renderJariHistory(){
  if(!jariContext)return;
  const{studentId,lang,stageId}=jariContext;
  const recs=records.filter(r=>r.student_id===studentId&&r.lang===lang&&r.type==='jari'&&r.stage_id===stageId)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const passCount=recs.filter(r=>!!r.passed).length;
  const container=document.getElementById('jari-history');
  if(!recs.length){container.innerHTML='';return;}
  container.innerHTML=`
    <div class="jari-history-wrap">
      <div class="jari-history-title">
        기록 히스토리
        <span style="color:var(--pass);font-weight:700">${passCount}회 통과</span>
        <span>/ 총 ${recs.length}회</span>
      </div>
      ${recs.map(r=>`
      <div class="jari-history-item">
        <span class="h-date">${r.date||'날짜없음'}</span>
        <span class="h-speed">${r.speed||'-'}타/분</span>
        <span class="h-acc">${r.accuracy||'-'}%</span>
        <span class="h-pass ${r.passed?'pass':'fail'}">${r.passed?'✓ 통과':'✗ 미통과'}</span>
        <span class="h-del" onclick="deleteJariRecord('${r.id}')">삭제</span>
      </div>`).join('')}
    </div>`;
}

async function deleteJariRecord(id){
  const{error}=await sb.from('records').delete().eq('id',id);
  if(error)return toast('삭제 실패','err');
  records=records.filter(r=>r.id!==id);
  renderJariHistory();renderStudentDetails();toast('기록 삭제됨');
}

async function saveJariRecord(){
  const speed=document.getElementById('jari-speed').value;
  const accuracy=document.getElementById('jari-accuracy').value;
  const date=document.getElementById('jari-date').value;
  const passed=document.getElementById('jari-pass-yes').checked;
  const rec={id:'rec_'+Date.now(),student_id:jariContext.studentId,lang:jariContext.lang,type:'jari',stage_id:jariContext.stageId,speed:speed?Number(speed):null,accuracy:accuracy?Number(accuracy):null,memo:'',date,passed};
  const{error}=await sb.from('records').insert(rec);
  if(error)return toast('저장 실패: '+error.message,'err');
  records.unshift(rec);
  toast(passed?'✓ 통과 기록 저장!':'기록 저장됨');
  document.getElementById('jari-speed').value='';
  document.getElementById('jari-accuracy').value='';
  document.getElementById('jari-pass-no').checked=true;
  renderJariHistory();renderStudentDetails();renderTop5();
}

// ── TOP 5 ──
function renderTop5(){
  const el=document.getElementById('top5-grid');
  if(!el) return;
  const month=document.getElementById('selected-month').value;
  if(!month) return;
  const ranks=['rank-1','rank-2','rank-3','rank-4','rank-5'];

  function getBests(lang,typeId){
    return students.map(stu=>{
      const recs=records.filter(r=>
        r.student_id===stu.id && r.lang===lang &&
        r.type===typeId && r.speed && r.date && r.date.startsWith(month)
      );
      if(!recs.length) return null;
      return{name:stu.name,id:stu.id,score:Math.max(...recs.map(r=>r.speed))};
    }).filter(Boolean).sort((a,b)=>b.score-a.score).slice(0,5);
  }

  // 자리연습 lang별 통과 횟수 (각각 TOP5)
  function getJariRanking(lang){
    return students.map(stu=>{
      const cnt=records.filter(r=>
        r.student_id===stu.id && r.type==='jari' && !!r.passed &&
        r.lang===lang && r.date && r.date.startsWith(month)
      ).length;
      return{name:stu.name,id:stu.id,score:cnt};
    }).filter(s=>s.score>0).sort((a,b)=>b.score-a.score).slice(0,5);
  }

  // 항상 5줄 고정 — 데이터 없는 줄은 투명 placeholder
  function makeItems(list,unit){
    const rows=[];
    for(let i=0;i<5;i++){
      const s=list[i];
      if(s){
        rows.push(`
          <div class="top5-item" onclick="selectStudent('${s.id}')">
            <div class="rank-badge ${ranks[i]}">${i+1}</div>
            <div class="top5-name">${s.name}</div>
            <div class="top5-score">${s.score}<span style="font-size:0.67rem;color:var(--text-muted);font-family:'Noto Sans KR'"> ${unit}</span></div>
          </div>`);
      } else {
        rows.push(`
          <div class="top5-item" style="opacity:0;pointer-events:none">
            <div class="rank-badge rank-${i+1}">${i+1}</div>
            <div class="top5-name">-</div>
            <div class="top5-score">--</div>
          </div>`);
      }
    }
    return rows.join('');
  }

  const TYPES=[
    {id:'word',  name:'낱말 연습'},
    {id:'short', name:'단문 연습'},
    {id:'long',  name:'장문 연습'},
  ];

  // 카드 4개: 가로 배치, 각 카드 안에 KR → US 세로 분리
  let cards='';
  TYPES.forEach(type=>{
    const ko=makeItems(getBests('korean',type.id),'타');
    const en=makeItems(getBests('english',type.id),'타');
    cards+=`
    <div class="top5-card">
      <div class="top5-card-header korean">
        <span>KR ${type.name}</span>
        <span class="badge">${month}</span>
      </div>
      <div class="top5-list">${ko}</div>
      <div class="top5-card-header english" style="border-top:1px solid var(--border);border-bottom:none">
        <span>US ${type.name}</span>
      </div>
      <div class="top5-list">${en}</div>
    </div>`;
  });
  // 자리연습: KR / US 각각 TOP5
  const jariKo=makeItems(getJariRanking('korean'),'회 통과');
  const jariEn=makeItems(getJariRanking('english'),'회 통과');
  cards+=`
    <div class="top5-card">
      <div class="top5-card-header korean">
        <span>KR 자리연습</span>
        <span class="badge">${month}</span>
      </div>
      <div class="top5-list">${jariKo}</div>
      <div class="top5-card-header english" style="border-top:1px solid var(--border);border-bottom:none">
        <span>US 자리연습</span>
      </div>
      <div class="top5-list">${jariEn}</div>
    </div>`;

  el.innerHTML=cards;
}

// ── TAB NAVIGATION ──
function tabNext(e,el){
  if(e.key!=='Tab') return;
  e.preventDefault();
  // 전체 테이블에서 모든 input[number] 수집
  const table=el.closest('[style*="overflow"]')||el.closest('.category-section');
  if(!table) return;
  const inputs=[...table.querySelectorAll('input[type=number]')];
  const idx=inputs.indexOf(el);
  if(idx===-1) return;
  const next=e.shiftKey ? inputs[idx-1] : inputs[idx+1];
  if(next){ next.focus(); next.select(); }
}

// ── EDIT STUDENT ──
let editingStudentId = null;
function openEditStudentModal(id){
  editingStudentId = id;
  const stu = students.find(s=>s.id===id);
  if(!stu) return;
  document.getElementById('edit-student-name').value = stu.name;
  const days = (stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
  renderDayCheckboxes('edit', days, stu.class_map||{});
  openModal('edit-student-modal');
  setTimeout(()=>document.getElementById('edit-student-name').focus(), 100);
}

async function saveEditStudent(){
  const name = document.getElementById('edit-student-name').value.trim();
  if(!name) return alert('이름을 입력하세요');
  const checked = [...document.querySelectorAll('input[name="edit-days"]:checked')].map(cb=>cb.value);
  const days = checked.join(',');
  const class_map={};
  checked.forEach(d=>{
    const sel=document.getElementById('edit-class-sel-'+d);
    if(sel&&sel.value) class_map[d]=sel.value;
  });
  showLoading();
  // Supabase에는 name, days만 업데이트
  const{error} = await sb.from('students').update({name, days}).eq('id', editingStudentId);
  hideLoading();
  if(error) return toast('수정 실패: '+error.message, 'err');
  // class_map은 localStorage
  saveClassMap(editingStudentId, class_map);
  const stu = students.find(s=>s.id===editingStudentId);
  if(stu){ stu.name=name; stu.days=days; stu.class_map=class_map; }
  closeModal('edit-student-modal');
  openDays.clear();
  if(checked.length) checked.forEach(d=>{openDays.add(d); if(class_map[d])openClasses.add(d+'::'+class_map[d]);});
  else openDays.add('기타');
  renderSidebar(); renderTop5();
  renderStudentContent();
  toast(`${name} 수정됨 ✓`);
}
