<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ Curio Typing Record</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    /* 세련된 프리미엄 다크 테마 팔레트 */
    --bg: #050508; 
    --surface: #0f0f1a; 
    --surface2: #16162a; 
    --border: rgba(255, 255, 255, 0.08);
    --accent: #7c4dff; /* 프리미엄 퍼플 */
    --accent2: #ff4081; /* 네온 핑크 */
    --accent3: #00e5ff; /* 사이언 블루 */
    --accent4: #ffab40; /* 소프트 오렌지 */
    --text: #f0f0f7; 
    --text-muted: #94a3b8;
    --gold: #ffd700; --silver: #e2e8f0; --bronze: #cd7f32;
    --pass: #00ffa3; /* 네온 그린 */
    --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Noto Sans KR', sans-serif; 
    min-height: 100vh; 
    overflow-x: hidden; 
    letter-spacing: -0.01em;
  }

  /* TOAST */
  #toast {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px);
    background: rgba(20, 20, 35, 0.9); backdrop-filter: blur(10px);
    border: 1px solid var(--border); color: var(--text);
    padding: 12px 28px; border-radius: 12px; font-size: 0.9rem;
    z-index: 9999; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: var(--shadow);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--pass); color: var(--pass); box-shadow: 0 0 15px rgba(0, 255, 163, 0.2); }
  #toast.err { border-color: var(--accent2); color: var(--accent2); }

  /* LOADING */
  #loading-overlay {
    position:fixed; inset:0; background:rgba(5, 5, 8, 0.85);
    display:flex; align-items:center; justify-content:center;
    z-index:8888; backdrop-filter:blur(8px);
  }
  #loading-overlay.hidden { display:none; }
  .spinner { 
    width:50px; height:50px; 
    border:3px solid rgba(124, 77, 255, 0.1); border-top-color: var(--accent); 
    border-radius:50%; animation:spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* HEADER */
  header {
    background: rgba(15, 15, 26, 0.8); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px; position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .header-title { display:flex; align-items:center; gap:12px; }
  .header-title h1 {
    font-family:'Space Mono',monospace; font-size:1.8rem; font-weight:800;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sync-status {
    font-size:0.8rem; padding:6px 14px; border-radius:999px;
    background: var(--surface2); border:1px solid var(--border); color:var(--text-muted);
    display:flex; align-items:center; gap:8px;
  }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:#444; }
  .sync-dot.connected { background:var(--pass); box-shadow:0 0 10px var(--pass); }

  /* BUTTONS */
  .btn {
    padding:10px 20px; border-radius:10px; border:none; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; font-weight:600; transition:all 0.3s;
  }
  .btn-primary { 
    background: linear-gradient(135deg, var(--accent), #5e35b1); color:white; 
    box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow: 0 6px 20px rgba(124, 77, 255, 0.4); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--border); border-color: var(--text-muted); }
  .btn-danger { background: rgba(255, 64, 129, 0.1); color: var(--accent2); border: 1px solid rgba(255, 64, 129, 0.2); }
  .btn-sm { padding:6px 12px; font-size:0.75rem; }

  /* MONTH BAR */
  .month-bar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:12px 32px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .month-bar label { font-size:0.85rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.1em; }
  .month-bar input[type=month], .month-bar select {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:8px 14px; border-radius:10px; font-family:'Space Mono',monospace; font-size:1rem; outline:none;
  }

  /* TOP5 */
  #top5-section { background: radial-gradient(circle at top right, rgba(124, 77, 255, 0.05), transparent); border-bottom:1px solid var(--border); padding:32px; }
  .section-title { font-size:0.9rem; font-weight:800; letter-spacing:0.2em; color:var(--text-muted); text-transform:uppercase; margin-bottom:24px; text-align:center; }
  .top5-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; }
  .top5-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .top5-card:hover { transform:translateY(-5px); border-color: rgba(124, 77, 255, 0.3); }
  .top5-list { padding:10px 0; }
  .top5-item { display:flex; align-items:center; justify-content:center; padding:12px 20px; gap:12px; transition:background 0.2s; cursor:pointer; }
  .top5-item:hover { background:rgba(255,255,255,0.03); }
  .rank-badge { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:1rem; font-weight:800; flex-shrink:0; }
  .rank-1 { background:var(--gold); color:#000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
  .rank-2 { background:var(--silver); color:#000; }
  .rank-3 { background:var(--bronze); color:#fff; }
  .rank-4,.rank-5 { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .top5-name { flex:1; font-size:1rem; font-weight:600; text-align:center; }
  .top5-score { font-family:'Space Mono',monospace; font-size:1.1rem; color:var(--accent3); font-weight:800; text-align:center; }

  /* AUTH */
  #auth-screen { position:fixed; inset:0; background:var(--bg); z-index:9000; display:flex; align-items:center; justify-content:center; }
  #auth-screen.hidden { display:none; }
  .auth-box {
    background:var(--surface); border:1px solid var(--border); border-radius:32px;
    padding:56px 48px; width:100%; max-width:440px; box-shadow: 0 32px 64px rgba(0,0,0,0.6);
  }
  .auth-logo {
    font-family:'Space Mono',monospace; font-size:1.8rem; font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-align:center; margin-bottom:12px;
  }
  .auth-sub { text-align:center; font-size:1rem; color:var(--text-muted); margin-bottom:32px; }
  .auth-tabs { display:flex; background:var(--surface2); border-radius:14px; padding:6px; gap:6px; margin-bottom:32px; }
  .auth-tab {
    flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:0.95rem; font-weight:700;
    background:transparent; color:var(--text-muted); transition:all 0.3s;
  }
  .auth-tab.active { background:var(--accent); color:white; box-shadow: 0 4px 12px rgba(124, 77, 255, 0.3); }
  .auth-field { margin-bottom:20px; }
  .auth-field label { display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em; }
  .auth-field input {
    width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:14px 18px; border-radius:12px; font-size:1rem; outline:none; transition:0.3s;
  }
  .auth-field input:focus { border-color:var(--accent); box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.1); }
  .auth-submit {
    width:100%; padding:16px; background:var(--accent); color:white; border:none;
    border-radius:12px; font-size:1.05rem; font-weight:700; cursor:pointer; transition:0.3s;
  }
  .auth-submit:hover { transform:translateY(-2px); background:#5e35b1; }
  .user-badge .email { color:var(--text); font-weight:600; font-size:1rem; }
  .logout-btn { padding:8px 16px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:0.9rem; cursor:pointer; transition:0.2s; }
  .logout-btn:hover { border-color:var(--accent2); color:var(--accent2); background:rgba(255, 64, 129, 0.05); }

  /* MAIN LAYOUT */
  main { display:flex; min-height:calc(100vh - 80px); }
  aside {
    width:280px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
    position:sticky; top:80px; height:calc(100vh - 80px); overflow-y:auto;
  }

  /* DAY TABS */
  .student-search-wrap { padding:20px; border-bottom:1px solid var(--border); }
  .student-search {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:12px 16px; border-radius:12px; font-size:0.95rem; outline:none; transition:0.3s;
  }
  .student-search:focus { border-color:var(--accent); }

  .day-tab-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; cursor:pointer; font-size:0.95rem; font-weight:700;
    color:var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.02); transition:0.2s;
  }
  .day-tab-header:hover { background:rgba(255,255,255,0.02); color:var(--text); }
  .day-tab-header.open { color:var(--accent); background:rgba(124, 77, 255, 0.05); }
  
  .student-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 24px 12px 36px; cursor:pointer; transition:0.2s; font-size:0.9rem; color:var(--text-muted);
  }
  .student-item:hover { background:var(--surface2); color:var(--text); }
  .student-item.active { background:rgba(124, 77, 255, 0.1); border-left:3px solid var(--accent); color:var(--accent); font-weight:700; }

  /* CONTENT */
  .content { flex:1; padding:40px; overflow-y:auto; }
  .content-header h2 { font-size:1.8rem; font-weight:800; margin-bottom:32px; }

  /* JARI GRID */
  .jari-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:12px; }
  .jari-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:16px;
    padding:20px 16px; cursor:pointer; transition:0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align:center;
  }
  .jari-card:hover { border-color:var(--accent); transform:translateY(-4px); background:var(--surface); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  .jari-card.has-pass { border-color:var(--pass); background:rgba(0, 255, 163, 0.03); }
  .jari-card-name { font-size:0.95rem; font-weight:700; color:var(--text); margin-bottom:12px; }
  .pass-count { font-family:'Space Mono',monospace; font-size:1.8rem; font-weight:800; color:var(--pass); text-shadow: 0 0 10px rgba(0, 255, 163, 0.3); }

  /* PRACTICE TABLE */
  .category-section { margin-bottom:48px; }
  .category-title { font-size:0.9rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); font-weight:800; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .category-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .combined-practice { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; box-shadow: var(--shadow); }
  
  /* TABLE INPUT STYLE */
  input[type=number] {
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid transparent !important;
    color: var(--text); font-family:'Space Mono',monospace; font-size:1.05rem;
    padding: 10px; border-radius: 8px; text-align: center; transition: 0.2s;
  }
  input[type=number]:focus {
    background: var(--surface2) !important;
    border-color: var(--accent) !important;
    outline: none;
    box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.15);
  }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); opacity:0; pointer-events:none; transition:opacity 0.3s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:28px; padding:40px; width:480px; max-width:90%; box-shadow: 0 24px 48px rgba(0,0,0,0.5); }
  .modal h3 { font-size:1.2rem; font-weight:800; margin-bottom:24px; color: var(--accent3); }

  /* CUSTOM SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--surface2); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border); }

  @media(max-width:900px) {
    aside { width:100%; height:auto; position:relative; top:0; }
    main { flex-direction:column; }
    .content { padding:24px; }
  }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>
<!-- AUTH SCREEN -->
<div id="auth-screen" class="hidden">
  <div class="auth-box">
    <div class="auth-logo">⌨️ CURIO TYPING RECORD</div>
    <div class="auth-sub">타자연습 기록 관리</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">회원가입</button>
    </div>
    <div class="auth-info" id="auth-info-box">학원 원장/강사만 계정을 만들 수 있습니다. 로그인 후 학생 기록을 관리하세요.</div>
    <div class="auth-field">
      <label>이메일</label>
      <input type="email" id="auth-email" placeholder="이메일 입력" onkeydown="if(event.key==='Enter')document.getElementById('auth-pw').focus()">
    </div>
    <div class="auth-field">
      <label>비밀번호</label>
      <input type="password" id="auth-pw" placeholder="비밀번호 입력 (6자 이상)" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="auth-field" id="auth-pw2-field" style="display:none">
      <label>비밀번호 확인</label>
      <input type="password" id="auth-pw2" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <button class="auth-submit" id="auth-btn" onclick="doAuth()">로그인</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-forgot" id="auth-forgot-wrap">
      <span onclick="doForgotPassword()">비밀번호를 잊으셨나요?</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL: 승인 관리 -->
<div class="modal-overlay" id="approval-modal">
  <div class="modal" style="max-width:500px">
    <h3>👥 가입 승인 관리</h3>
    <div id="approval-list" style="margin-top:12px;max-height:400px;overflow-y:auto">
      <div style="text-align:center;padding:20px;color:var(--text-muted)">불러오는 중...</div>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('approval-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- MODAL: 승인 관리 -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal" style="max-width:500px">
    <h3>👑 가입 승인 관리</h3>
    <div id="admin-user-list" style="margin-top:12px">
      <div style="text-align:center;color:var(--text-muted);padding:20px">불러오는 중...</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('admin-modal')">닫기</button>
    </div>
  </div>
</div>

<header>
  <div class="header-title">
    <span>⌨️</span>
    <h1>CURIO TYPING RECORD</h1>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">연결 중...</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="user-badge">
      <span>👤</span>
      <span class="email" id="user-email-display"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
    <button class="btn btn-secondary" id="admin-btn" onclick="openAdminModal()" style="display:none;border-color:var(--accent4);color:var(--accent4)">👑 승인 관리</button>
    <button class="btn btn-secondary" id="admin-btn" onclick="openApprovalModal()" style="display:none">👥 승인 관리</button>
    <button class="btn btn-primary" onclick="openAddStudentModal()">+ 학생 추가</button>
  </div>
</header>

<div class="month-bar">
  <label>📅 기준 월</label>
  <input type="month" id="selected-month" onchange="renderAll()">
</div>

<div id="top5-section">
  <div class="section-title">🏆 이달의 TOP 5</div>
  <div class="top5-grid" id="top5-grid"></div>
</div>

<main>
  <aside>
    <div class="student-search-wrap">
      <input class="student-search" id="student-search" placeholder="🔍 학생 검색..." oninput="searchStudents(this.value)">
    </div>
    <div id="search-results" style="display:none"></div>
    <div class="day-tabs" id="day-tabs"></div>
  </aside>
  <div class="content" id="main-content">
    <div class="empty-state">
      <div class="icon">👈</div>
      <p>왼쪽에서 학생을 선택하거나 추가하세요</p>
    </div>
  </div>
</main>

<!-- MODAL: 학생 추가 -->
<div class="modal-overlay" id="add-student-modal">
  <div class="modal">
    <h3>👤 학생 추가</h3>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="new-student-name" placeholder="이름 입력" onkeydown="if(event.key==='Enter') addStudent()">
    </div>
    <div class="form-group">
      <label>수업 요일 (복수 선택 가능)</label>
      <div class="day-checkbox-group" data-day-group="new-days" id="new-days-wrap"></div>
    </div>
    <div id="new-class-selects" style="margin-top:4px"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="addStudent()">추가</button>
      <button class="btn btn-secondary" onclick="closeModal('add-student-modal')">취소</button>
    </div>
  </div>
</div>

<!-- MODAL: 요일 추가 -->
<div class="modal-overlay" id="add-day-modal">
  <div class="modal" style="max-width:320px">
    <h3>📅 요일 추가</h3>
    <div class="form-group">
      <label>요일 이름 (예: 월, 화, 주말, 특강 등)</label>
      <input type="text" id="new-day-name" placeholder="요일 이름 입력" onkeydown="if(event.key==='Enter')addDay()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="addDay()">추가</button>
      <button class="btn btn-secondary" onclick="closeModal('add-day-modal')">취소</button>
    </div>
  </div>
</div>

<!-- MODAL: 클래스 추가 -->
<div class="modal-overlay" id="add-class-modal">
  <div class="modal" style="max-width:360px">
    <h3>📌 클래스 추가</h3>
    <div class="form-group">
      <label>클래스 이름 (예: A반, 오전반, 초급반)</label>
      <input type="text" id="new-class-name" placeholder="클래스 이름 입력" onkeydown="if(event.key==='Enter')addClassConfirm()">
    </div>
    <div class="form-group">
      <label>적용할 요일 선택 (복수 선택 가능)</label>
      <div class="day-checkbox-group" id="add-class-day-wrap"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="addClassConfirm()">추가</button>
      <button class="btn btn-secondary" onclick="closeModal('add-class-modal')">취소</button>
    </div>
  </div>
</div>

<!-- MODAL: 학생 수정 -->
<div class="modal-overlay" id="edit-student-modal">
  <div class="modal">

// DAYS: localStorage로 동적 관리 (기본값 월~토)
// dayClasses: { '월': ['A반','B반'], '화': [] } — 클래스 이름 목록
let DAYS = ['월','화','수','목','금','토'];
let dayClasses = {}; // 요일별 클래스 목록
let openClasses = new Set(); // 열린 클래스 그룹 키 (day+class)

function loadDaysConfig(){
  try{
    const saved = localStorage.getItem('days_config');
    if(saved){ const p=JSON.parse(saved); DAYS=p.days||DAYS; dayClasses=p.classes||{}; }
    DAYS.forEach(d=>{ if(!dayClasses[d]) dayClasses[d]=[]; });
  }catch(e){}
}
function saveDaysConfig(){
  localStorage.setItem('days_config', JSON.stringify({days:DAYS, classes:dayClasses}));
}
// 학생별 클래스 배정 — localStorage
function saveClassMap(stuId, map){
  const all=JSON.parse(localStorage.getItem('class_maps')||'{}');
  all[stuId]=map;
  localStorage.setItem('class_maps',JSON.stringify(all));
}
function loadClassMap(stuId){
  try{ return JSON.parse(localStorage.getItem('class_maps')||'{}')[stuId]||{}; }catch(e){return{};}
}

let students=[], records=[];
let selectedStudentId=null, selectedLang='korean', jariContext=null;
let openDays=new Set(); // 열린 요일 그룹

// ── UI HELPERS ──
function showLoading(){document.getElementById('loading-overlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}
let toastTimer;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='',2500);
}
function setConnected(ok){
  document.getElementById('sync-dot').className='sync-dot'+(ok?' connected':'');
  document.getElementById('sync-text').textContent=ok?'실시간 연결됨':'연결 끊김';
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});
});

// ── AUTH ──
let currentUser=null;
let authMode='login';

function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup'));
  });
  document.getElementById('auth-btn').textContent=mode==='login'?'로그인':'회원가입';
  document.getElementById('auth-pw2-field').style.display=mode==='signup'?'block':'none';
  document.getElementById('auth-info-box').textContent=mode==='login'
    ?'학원 원장/강사만 계정을 만들 수 있습니다. 로그인 후 학생 기록을 관리하세요.'
    :'회원가입 후 이메일 인증이 필요할 수 있습니다.';
  document.getElementById('auth-error').textContent='';
  // 비밀번호 찾기 링크 — 로그인 탭일 때만 표시
  const forgot=document.getElementById('auth-forgot-wrap');
  if(forgot) forgot.style.display=mode==='login'?'block':'none';
}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  const pw2=document.getElementById('auth-pw2').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-btn');
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력하세요.';return;}
  if(authMode==='signup'&&pw!==pw2){errEl.textContent='비밀번호가 일치하지 않습니다.';return;}
  if(authMode==='signup'&&pw.length<6){errEl.textContent='비밀번호는 6자 이상이어야 합니다.';return;}
  btn.disabled=true; errEl.textContent='';
  try{
    if(authMode==='login'){
      // 로그인 시도 — 승인 여부는 onAuthStateChange에서 처리
      const result=await sb.auth.signInWithPassword({email,password:pw});
      if(result.error) throw result.error;

    } else {
      // 회원가입: Supabase 계정 생성 + 승인 대기 등록 + 관리자 이메일 발송
      const result=await sb.auth.signUp({email,password:pw});
      if(result.error) throw result.error;

      // approved_users 테이블에 대기 등록
      await sb.from('approved_users').insert({email, approved:false});

      // 관리자에게 이메일 발송
      const now=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
      try{
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email: email,
          time: now,
        });
      } catch(emailErr){
        console.warn('이메일 발송 실패:', emailErr);
      }

      // 회원가입 후 즉시 로그아웃 — 승인 전까지 접근 차단
      await sb.auth.signOut();
      errEl.style.color='var(--pass)';
      errEl.textContent='✓ 가입 신청 완료! 관리자 승인 후 로그인이 가능합니다.';
      switchAuthTab('login');
    }
  } catch(e){
    const msg=e.message||'오류가 발생했습니다.';
    errEl.style.color='var(--accent2)';
    errEl.textContent=
      msg.includes('Invalid login')?'이메일 또는 비밀번호가 틀렸습니다.':
      msg.includes('already registered')?'이미 등록된 이메일입니다.':
      msg.includes('Email not confirmed')?'이메일 인증이 필요합니다.':msg;
  }
  btn.disabled=false;
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('user-email-display').textContent='';
  document.getElementById('auth-screen').classList.remove('hidden');
  students=[]; records=[];
  document.getElementById('main-content').innerHTML='<div class="empty-state"><div class="icon">👈</div><p>왼쪽에서 학생을 선택하거나 추가하세요</p></div>';
  document.getElementById('day-tabs').innerHTML='';
  document.getElementById('top5-grid').innerHTML='';
  toast('로그아웃되었습니다.');

// ── INIT ──
let appInitialized = false; // 최초 1회만 초기화

window.onload=async()=>{
  // EmailJS 초기화
  emailjs.init(EMAILJS_PUBLIC_KEY);
  // DAYS 설정 먼저 로드 (auth 전에도 필요)
  loadDaysConfig();
  const now=new Date();
  document.getElementById('selected-month').value=
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Auth 상태 감지 — SIGNED_IN 이벤트만 처리, TOKEN_REFRESHED 등 무시
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN' && session?.user && !appInitialized){
      // 승인 여부 확인
      const{data:apData}=await sb.from('approved_users').select('approved').eq('email',session.user.email).single();
      if(!apData || !apData.approved){
        // 미승인 계정 — 즉시 로그아웃
        await sb.auth.signOut();
        const errEl=document.getElementById('auth-error');
        if(errEl){
          errEl.style.color='var(--accent4)';
          errEl.textContent='⏳ 승인 대기 중입니다. 관리자 승인 후 로그인이 가능합니다.';
        }
        return;
      }
      appInitialized=true;
      currentUser=session.user;
      document.getElementById('user-email-display').textContent=session.user.email;
      document.getElementById('auth-screen').classList.add('hidden');
      await loadAll();
      setupRealtime();
    }
    if(event==='SIGNED_OUT'){
      appInitialized=false;
    }
    // TOKEN_REFRESHED, USER_UPDATED 등은 완전히 무시 → 스피너 없음
  });

  // 이미 로그인 세션 있으면 바로 진입
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user && !appInitialized){
    appInitialized=true;
    currentUser=session.user;
    document.getElementById('user-email-display').textContent=session.user.email;
    document.getElementById('auth-screen').classList.add('hidden');
    await loadAll();
    setupRealtime();
  } else if(!session){
    document.getElementById('auth-screen').classList.remove('hidden');
    hideLoading();
  } else {
    hideLoading();
  }
};

async function loadAll(){
  showLoading();
  try{
    const[{data:sd,error:se},{data:rd,error:re}]=await Promise.all([
      sb.from('students').select('*').order('created_at'),
      sb.from('records').select('*').order('date',{ascending:false})
    ]);
    if(se)throw se; if(re)throw re;
    students=(sd||[]).map(s=>{
      const cm=loadClassMap(s.id);
      return{...s,class_map:cm};
    });
    records=rd||[];
    setConnected(true); renderAll();
    // 관리자 계정이면 승인 관리 버튼 표시
    if(currentUser && ADMIN_EMAIL.includes(currentUser.email)){
      const adminBtn = document.getElementById('admin-btn');
      if(adminBtn) adminBtn.style.display='inline-flex';
    }
    // 관리자 버튼 표시
    const adminBtn=document.getElementById('admin-btn');
    if(adminBtn) adminBtn.style.display=isAdmin()?'inline-flex':'none';
  }catch(e){
    const msg = e?.message || e?.error_description || JSON.stringify(e) || '알 수 없는 오류';
    toast('로드 실패: '+msg,'err');
    console.error('loadAll error:', e);
    setConnected(false);
  }
  finally{hideLoading();}
}

function setupRealtime(){
  sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'students'},async()=>{
      const{data}=await sb.from('students').select('*').order('created_at');
      if(data){students=data;renderSidebar();renderTop5();}
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'records'},async()=>{
      const{data}=await sb.from('records').select('*').order('date',{ascending:false});
      if(data){
        records=data;renderTop5();
        if(selectedStudentId)renderStudentDetails();
        if(jariContext)renderJariHistory();
      }
    })
    .subscribe(s=>setConnected(s==='SUBSCRIBED'));
}

function renderAll(){renderSidebar();renderTop5();if(selectedStudentId)renderStudentContent();}



// ── SIDEBAR (요일별 그룹 + 클래스 그룹) ──
function renderSidebar(){
  const container=document.getElementById('day-tabs');

  const dayGroups={};
  DAYS.forEach(d=>dayGroups[d]=[]);
  dayGroups['기타']=[];

  students.forEach(stu=>{
    const days=(stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
    if(!days.length){dayGroups['기타'].push(stu);return;}
    days.forEach(d=>{
      if(dayGroups[d])dayGroups[d].push(stu);
      else dayGroups['기타'].push(stu);
    });
  });

  const allDayKeys=[...DAYS,'기타'];

  let html = allDayKeys.map(day=>{
    const stuList=[...new Map(dayGroups[day].map(s=>[s.id,s])).values()]
      .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

    // 기타는 학생 없으면 숨김, 추가된 요일은 학생 없어도 항상 표시
    if(day==='기타' && !stuList.length) return '';

    const isOpen=openDays.has(day);
    const classes = (dayClasses[day]||[]);
    const dayLabel = day==='기타' ? '기타' : day+'요일';

    let studentsHtml = '';
    if(!stuList.length){
      studentsHtml = '<div style="padding:8px 14px;font-size:0.78rem;color:var(--border)">학생 없음</div>';
    } else if(classes.length === 0){
      studentsHtml = stuList.map(s=>studentItemHtml(s)).join('');
    } else {
      classes.forEach(cls=>{
        const clsKey = day+'::'+cls;
        const clsStudents = stuList.filter(s=>(s.class_map||{})[day]===cls);
        const isClsOpen = openClasses.has(clsKey);
        studentsHtml += `
          <div class="class-group">
            <div class="class-group-header ${isClsOpen?'open':''}" onclick="toggleClass('${clsKey}')">
              <span>📌 ${cls}</span>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:0.65rem;color:var(--text-muted)">${clsStudents.length}명</span>
                <span class="cg-arrow">▶</span>
                <span onclick="event.stopPropagation();renameClass('${day}','${cls}')" title="클래스 이름 변경" style="font-size:0.65rem;color:var(--text-muted);cursor:pointer;padding:2px 5px;border-radius:3px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">✏️</span>
                <span onclick="event.stopPropagation();deleteClass('${day}','${cls}')" title="클래스 삭제" style="font-size:0.65rem;color:var(--accent2);cursor:pointer;padding:2px 5px;border-radius:3px" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''">✕</span>
              </div>
            </div>
            <div class="class-group-students ${isClsOpen?'open':''}">
              ${clsStudents.length ? clsStudents.map(s=>studentItemHtml(s,true)).join('') : '<div style="padding:6px 14px 6px 30px;font-size:0.75rem;color:var(--border)">학생 없음</div>'}
            </div>
          </div>`;
      });
      const unassigned = stuList.filter(s=>!classes.includes((s.class_map||{})[day]));
      if(unassigned.length){
        studentsHtml += `<div style="padding:4px 14px 2px;font-size:0.65rem;color:var(--text-muted);border-top:1px solid rgba(46,46,72,0.5)">미배정</div>`;
        studentsHtml += unassigned.map(s=>studentItemHtml(s,true)).join('');
      }
    }

    // 요일 바에는 화살표만 — ＋반/삭제 버튼 없음
    return `
    <div class="day-group">
      <div class="day-tab-header ${isOpen?'open':''}" onclick="toggleDay('${day}')">
        <span>${dayLabel}</span>
        <span class="day-arrow">▶</span>
      </div>
      <div class="day-students ${isOpen?'open':''}">
        ${studentsHtml}
      </div>
    </div>`;
  }).join('');

  // 하단 버튼: 요일 추가 + 클래스 추가
  html += `
    <button class="add-day-btn" onclick="openAddDayModal()">＋ 요일 추가</button>
    <button class="add-day-btn" onclick="openAddClassModal()" style="border-color:rgba(247,151,30,0.4);color:var(--accent4)">＋ 클래스 추가</button>
  `;
  container.innerHTML = html;
}

function studentItemHtml(s, indented=false){
  return `<div class="student-item ${indented?'indented':''} ${s.id===selectedStudentId?'active':''}" onclick="selectStudent('${s.id}')">
    <span>${s.name}</span>
    <span class="student-del" onclick="deleteStudent(event,'${s.id}')">✕</span>
  </div>`;
}

function toggleClass(key){
  if(openClasses.has(key))openClasses.delete(key);
  else openClasses.add(key);
  renderSidebar();
}

// ── 승인 관리 ──

async function openApprovalModal(){
  openModal('approval-modal');
  await loadApprovalList();
}

async function loadApprovalList(){
  const listEl = document.getElementById('approval-list');
  listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">불러오는 중...</div>';
  const{data, error} = await sb.from('approved_users').select('*').order('created_at', {ascending:false});
  if(error || !data || !data.length){
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">신청 내역이 없습니다.</div>';
    return;
  }
  listEl.innerHTML = data.map(u=>`
    <div class="approval-item">
      <div>
        <div style="font-weight:700;margin-bottom:4px">${u.email}</div>
        <div style="font-size:0.8rem;color:var(--text-muted)">${new Date(u.created_at).toLocaleString('ko-KR')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${u.approved
          ? '<span class="approval-badge badge-approved">✓ 승인됨</span>'
          : `<span class="approval-badge badge-pending">⏳ 대기중</span>
             <button class="approve-btn" onclick="approveUser('${u.email}')">승인</button>
             <button class="reject-btn" onclick="rejectUser('${u.email}')">거절</button>`
        }
      </div>
    </div>`).join('');
}

async function approveUser(email){
  const{error} = await sb.from('approved_users').update({approved:true}).eq('email',email);
  if(error){ toast('승인 실패: '+error.message,'err'); return; }
  toast(`${email} 승인 완료! ✓`);
  loadApprovalList();
}

async function rejectUser(email){
  if(!confirm(`${email} 을 거절하시겠습니까?
해당 계정은 삭제됩니다.`)) return;
  await sb.from('approved_users').delete().eq('email',email);
  toast('거절 처리됨');
  loadApprovalList();
}

// ── 학생 검색 ──
function searchStudents(query){
  const resultsEl = document.getElementById('search-results');
  const dayTabsEl = document.getElementById('day-tabs');
  const q = query.trim();
  if(!q){
    resultsEl.style.display='none';
    dayTabsEl.style.display='flex';
    return;
  }
  const matched = students.filter(s=>s.name.includes(q));
  dayTabsEl.style.display='none';
  resultsEl.style.display='block';
  if(!matched.length){
    resultsEl.innerHTML='<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:1.0rem">검색 결과 없음</div>';
    return;
  }
  resultsEl.innerHTML = matched.map(s=>{
    const days=(s.days||'').split(',').filter(Boolean).join('·')||'요일없음';
    return `<div class="search-result-item ${s.id===selectedStudentId?'active':''}" onclick="selectStudent('${s.id}');clearSearch()">
      <span>${s.name}</span>
      <span class="search-result-day">${days}</span>
    </div>`;
  }).join('');
}
function clearSearch(){
  const el=document.getElementById('student-search');
  if(el) el.value='';
  document.getElementById('search-results').style.display='none';
  document.getElementById('day-tabs').style.display='flex';
}

async function doForgotPassword(){
  const email=document.getElementById('auth-email').value.trim();
  const errEl=document.getElementById('auth-error');
  if(!email){
    errEl.style.color='var(--accent2)';
    errEl.textContent='이메일을 먼저 입력해주세요.';
    return;
  }
  const{error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo: window.location.href
  });
  if(error){
    errEl.style.color='var(--accent2)';
    errEl.textContent='오류: '+error.message;
  } else {
    errEl.style.color='var(--pass)';
    errEl.textContent='✓ 비밀번호 재설정 이메일을 보냈습니다! 메일함을 확인하세요.';
  }
}

function toggleDay(day){
  if(openDays.has(day))openDays.delete(day);
  else openDays.add(day);
  renderSidebar();
}

// ── 요일 추가/삭제 ──
function openAddDayModal(){
  document.getElementById('new-day-name').value='';
  openModal('add-day-modal');
  setTimeout(()=>document.getElementById('new-day-name').focus(),100);
}
function addDay(){
  const name=document.getElementById('new-day-name').value.trim();
  if(!name)return;
  if(DAYS.includes(name))return alert('이미 있는 요일입니다.');
  DAYS.push(name);
  if(!dayClasses[name]) dayClasses[name]=[];
  saveDaysConfig();
  closeModal('add-day-modal');
  // 학생 추가/수정 모달 체크박스 갱신
  refreshDayCheckboxes();
  openDays.add(name);
  renderSidebar();
  toast(name+'요일 추가됨 ✓');
}
function deleteDay(day){
  if(!confirm(`"${day}요일"을 삭제하시겠습니까?
해당 요일에 배정된 학생들은 "기타"로 이동합니다.`))return;
  DAYS=DAYS.filter(d=>d!==day);
  delete dayClasses[day];
  saveDaysConfig();
  // 학생 days 필드에서 해당 요일 제거
  students.forEach(s=>{
    const days=(s.days||'').split(',').map(d=>d.trim()).filter(d=>d&&d!==day);
    s.days=days.join(',');
    sb.from('students').update({days:s.days}).eq('id',s.id);
  });
  refreshDayCheckboxes();
  renderSidebar();
  toast(day+'요일 삭제됨');
}

// ── 클래스 추가/삭제/수정 ──
function openAddClassModal(){
  // 클래스 추가 모달 — 요일 체크박스 + 클래스 이름
  const wrap=document.getElementById('add-class-day-wrap');
  if(wrap) wrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="add-class-days" value="${d}"> ${d}
    </label>`).join('');
  document.getElementById('new-class-name').value='';
  openModal('add-class-modal');
  setTimeout(()=>document.getElementById('new-class-name').focus(),100);
}
function addClassConfirm(){
  const name=document.getElementById('new-class-name').value.trim();
  if(!name){alert('클래스 이름을 입력하세요.');return;}
  const checked=[...document.querySelectorAll('input[name="add-class-days"]:checked')].map(cb=>cb.value);
  if(!checked.length){alert('요일을 1개 이상 선택하세요.');return;}
  let added=[];
  checked.forEach(d=>{
    if(!dayClasses[d]) dayClasses[d]=[];
    if(!dayClasses[d].includes(name)){
      dayClasses[d].push(name);
      openDays.add(d);
      openClasses.add(d+'::'+name);
      added.push(d);
    }
  });
  saveDaysConfig();
  closeModal('add-class-modal');
  renderSidebar();
  if(added.length) toast(`${added.join('·')}요일에 "${name}" 추가됨 ✓`);
  else toast('이미 있는 클래스입니다.','err');
}
function addClassToDay(day){
  // 요일 헤더 버튼에서 호출 — 해당 요일 미리 체크
  openAddClassModal();
  setTimeout(()=>{
    document.querySelectorAll('input[name="add-class-days"]').forEach(cb=>{
      cb.checked=(cb.value===day);
    });
  },120);
}
function renameClass(day,oldName){
  const newName=prompt(`클래스 이름 변경`, oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const n=newName.trim();
  dayClasses[day]=dayClasses[day].map(c=>c===oldName?n:c);
  // 학생 class_map도 업데이트
  students.forEach(s=>{
    if((s.class_map||{})[day]===oldName){
      s.class_map[day]=n;
      const memo=JSON.stringify(s.class_map);
      sb.from('students').update({memo}).eq('id',s.id);
    }
  });
  saveDaysConfig();
  renderSidebar();
  toast('클래스 이름 변경됨');
}
function deleteClass(day,cls){
  if(!confirm(`"${cls}"를 삭제하시겠습니까?
해당 클래스 학생들은 "미배정"으로 이동합니다.`))return;
  dayClasses[day]=dayClasses[day].filter(c=>c!==cls);
  students.forEach(s=>{
    if((s.class_map||{})[day]===cls){
      delete s.class_map[day];
      const memo=JSON.stringify(s.class_map);
      sb.from('students').update({memo}).eq('id',s.id);
    }
  });
  saveDaysConfig();
  renderSidebar();
  toast('클래스 삭제됨');
}

// 학생 모달 체크박스를 현재 DAYS에 맞게 갱신 (id 기반)
function refreshDayCheckboxes(){
  const newWrap=document.getElementById('new-days-wrap');
  if(newWrap) newWrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="new-days" value="${d}" onchange="updateClassSelects('new')"> ${d}
    </label>`).join('');
  const editWrap=document.getElementById('edit-days-wrap');
  if(editWrap) editWrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="edit-days" value="${d}" onchange="updateClassSelects('edit')"> ${d}
    </label>`).join('');
}

// ── STUDENT ACTIONS ──
function selectStudent(id){
  selectedStudentId=id;
  // 해당 학생이 속한 요일 자동 열기
  const stu=students.find(s=>s.id===id);
  if(stu){
    const days=(stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
    if(days.length)days.forEach(d=>openDays.add(d));
    else openDays.add('기타');
  }
  renderSidebar();
  renderStudentContent();
}

async function deleteStudent(e,id){
  e.stopPropagation();
  if(!confirm('정말 삭제하시겠습니까?'))return;
  showLoading();
  const{error}=await sb.from('students').delete().eq('id',id);
  hideLoading();
  if(error)return toast('삭제 실패: '+error.message,'err');
  students=students.filter(s=>s.id!==id);
  records=records.filter(r=>r.student_id!==id);
  if(selectedStudentId===id){
    selectedStudentId=null;
    document.getElementById('main-content').innerHTML=
      `<div class="empty-state"><div class="icon">👈</div><p>왼쪽에서 학생을 선택하거나 추가하세요</p></div>`;
  }
  renderSidebar();renderTop5();
  toast('학생 삭제됨');
}

function renderDayCheckboxes(prefix, checkedDays=[], classMaps={}){
  const wrap=document.getElementById(prefix+'-days-wrap');
  if(!wrap)return;
  wrap.innerHTML=DAYS.map(d=>`
    <label class="day-cb-label">
      <input type="checkbox" name="${prefix}-days" value="${d}"
        ${checkedDays.includes(d)?'checked':''}
        onchange="updateClassSelects('${prefix}')">
      ${d}
    </label>`).join('');
  updateClassSelects(prefix, classMaps);
}
function updateClassSelects(prefix, classMaps={}){
  const selWrap=document.getElementById(prefix+'-class-selects');
  if(!selWrap)return;
  const checked=[...document.querySelectorAll(`input[name="${prefix}-days"]:checked`)].map(cb=>cb.value);
  selWrap.innerHTML=checked.map(d=>{
    const classes=dayClasses[d]||[];
    if(!classes.length)return '';
    const cur=classMaps[d]||'';
    return `<div class="form-group" style="margin-bottom:8px">
      <label style="font-size:0.78rem;color:var(--text-muted)">${d}요일 클래스 <span style="color:var(--text-muted);font-size:0.7rem">(선택)</span></label>
      <select id="${prefix}-class-sel-${d}"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem">
        <option value="">— 클래스 미배정</option>
        ${classes.map(c=>`<option value="${c}" ${cur===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>`;
  }).join('');
}
function openAddStudentModal(){
  document.getElementById('new-student-name').value='';
  renderDayCheckboxes('new');
  openModal('add-student-modal');
  setTimeout(()=>document.getElementById('new-student-name').focus(),100);
}

async function addStudent(){
  const name=document.getElementById('new-student-name').value.trim();
  if(!name)return alert('이름을 입력하세요');
  const checked=[...document.querySelectorAll('input[name="new-days"]:checked')].map(cb=>cb.value);
  const days=checked.join(',');
  // 클래스 선택 수집 (로컬 저장)
  const class_map={};
  checked.forEach(d=>{
    const sel=document.getElementById('new-class-sel-'+d);
    if(sel&&sel.value) class_map[d]=sel.value;
  });
  const id='stu_'+Date.now();
  showLoading();
  // Supabase에는 id,name,days만 저장 (memo 컬럼 없음)
  const{error}=await sb.from('students').insert({id,name,days,user_id:currentUser.id});
  hideLoading();
  if(error)return toast('추가 실패: '+error.message,'err');
  // class_map은 localStorage에 저장
  saveClassMap(id, class_map);
  const stu={id,name,days,class_map};
  students.push(stu);
  closeModal('add-student-modal');
  if(checked.length)checked.forEach(d=>{openDays.add(d); if(class_map[d])openClasses.add(d+'::'+class_map[d]);});
  else openDays.add('기타');
  renderSidebar();
  selectStudent(id);
  toast(`${name} 추가됨 ✓`);
}

// ── STUDENT CONTENT ──
function renderStudentContent(){
  const stu=students.find(s=>s.id===selectedStudentId);
  if(!stu)return;

  const stuDaysLabel=(stu.days||'').split(',').filter(Boolean).join('·')||'요일없음';
  document.getElementById('main-content').innerHTML=`
    <div class="content-header">
      <h2>📋 ${stu.name}
        <button class="edit-day-btn" onclick="openEditStudentModal('${stu.id}')">✏️ ${stuDaysLabel} 수정</button>
      </h2>
    </div>
    <div id="student-details"></div>`;
  renderStudentDetails();
}


function renderStudentDetails(){
  const container=document.getElementById('student-details');
  if(!container)return;

  // ── 자리 연습 (한글/영어 분리 표시) ──
  let html=`<div class="category-section">
    <div class="category-title">🖐 자리 연습</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <span style="font-size:0.72rem;color:var(--accent);font-weight:700">🇰🇷 한글</span>
    </div>
    <div class="jari-grid" style="margin-bottom:12px">`;

  JARI_STAGES.forEach(stage=>{
    const recs=records.filter(r=>r.student_id===selectedStudentId&&r.lang==='korean'&&r.type==='jari'&&r.stage_id===stage.id);
    const passCount=recs.filter(r=>!!r.passed).length;
    const totalCount=recs.length;
    const hasPass=passCount>0;
    const barPct=totalCount?Math.round(passCount/totalCount*100):0;
    html+=`
    <div class="jari-card ${totalCount?'has-record':''} ${hasPass?'has-pass':''}" onclick="openJariModalLang('${stage.id}','${stage.name}','korean')">
      <div class="jari-card-label">자리</div>
      <div class="jari-card-name">${stage.name}</div>
      ${totalCount>0?`
        <div class="jari-pass-row"><span class="pass-count">${passCount}</span><span class="pass-denom">/${totalCount}</span></div>
      `:`<div class="jari-card-empty">클릭해서 추가</div>`}
    </div>`;
  });
  html+=`</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <span style="font-size:0.72rem;color:var(--accent4);font-weight:700">🇺🇸 영어</span>
    </div>
    <div class="jari-grid">`;

  JARI_STAGES.forEach(stage=>{
    const recs=records.filter(r=>r.student_id===selectedStudentId&&r.lang==='english'&&r.type==='jari'&&r.stage_id===stage.id);
    const passCount=recs.filter(r=>!!r.passed).length;
    const totalCount=recs.length;
    const hasPass=passCount>0;
    const barPct=totalCount?Math.round(passCount/totalCount*100):0;
    html+=`
    <div class="jari-card ${totalCount?'has-record':''} ${hasPass?'has-pass':''}" onclick="openJariModalLang('${stage.id}','${stage.name}','english')" style="border-color:${hasPass?'var(--pass)':totalCount?'rgba(247,151,30,0.25)':'var(--border)'}">
      <div class="jari-card-label" style="color:var(--accent4)">자리</div>
      <div class="jari-card-name">${stage.name}</div>
      ${totalCount>0?`
        <div class="jari-pass-row"><span class="pass-count" style="color:var(--accent4)">${passCount}</span><span class="pass-denom">/${totalCount}</span></div>
      `:`<div class="jari-card-empty">클릭해서 추가</div>`}
    </div>`;
  });
  html+=`</div></div>`;

  // ── 낱말/단문/장문 통합 테이블 (KR+US 통합) ──
  const typeDataKR = OTHER_TYPES.map(type=>{
    const recs=records.filter(r=>r.student_id===selectedStudentId&&r.lang==='korean'&&r.type===type.id)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const speeds=recs.filter(r=>r.speed>0).map(r=>r.speed);
    return{type,recs,globalBest:speeds.length?Math.max(...speeds):null};
  });
  const typeDataUS = OTHER_TYPES.map(type=>{
    const recs=records.filter(r=>r.student_id===selectedStudentId&&r.lang==='english'&&r.type===type.id)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const speeds=recs.filter(r=>r.speed>0).map(r=>r.speed);
    return{type,recs,globalBest:speeds.length?Math.max(...speeds):null};
  });

  // COL: 날짜 | KR낱말 | KR삭제 | US낱말 | US삭제 | KR단문 | KR삭제 | US단문 | US삭제 | KR장문 | KR삭제 | US장문 | US삭제
  const COL  = 'grid-template-columns:110px 1fr 30px 1fr 30px 1fr 30px 1fr 30px 1fr 30px 1fr 30px';
  const MINW = 'min-width:900px';
  const ROWH = 'min-height:56px';

  const allDates=[...new Set([
    ...typeDataKR.flatMap(d=>d.recs.map(r=>r.date||'')),
    ...typeDataUS.flatMap(d=>d.recs.map(r=>r.date||''))
  ].filter(Boolean))].sort((a,b)=>b.localeCompare(a));

  html+=`<div class="category-section">
    <div class="category-title">✏️ 낱말 · 단문 · 장문 연습</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto">

      <!-- 전체 최고기록 행 -->
      <div style="display:grid;${COL};background:var(--surface2);border-bottom:2px solid var(--border);${MINW}">
        <div style="padding:10px 12px;font-size:1.0rem;color:var(--text-muted);font-weight:700;border-right:1px solid var(--border);display:flex;align-items:center">전체<br>최고기록</div>
        ${OTHER_TYPES.flatMap((type,i)=>{
          const kr=typeDataKR[i]; const us=typeDataUS[i];
          const sep=i<2?'border-right:2px solid var(--border)':'';
          return[
            `<div style="padding:10px 10px;border-right:1px solid rgba(108,99,255,0.2)">
              <div style="font-size:0.85rem;color:var(--accent);margin-bottom:3px">🇰🇷 ${type.name}</div>
              <div style="font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent3)">${kr.globalBest??'--'}<span style="font-size:0.75rem;color:var(--text-muted)"> 타</span></div>
            </div>`,
            `<div style="border-right:1px solid rgba(108,99,255,0.15)"></div>`,
            `<div style="padding:10px 10px;border-right:1px solid rgba(247,151,30,0.3)">
              <div style="font-size:0.85rem;color:var(--accent4);margin-bottom:3px">🇺🇸 ${type.name}</div>
              <div style="font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent3)">${us.globalBest??'--'}<span style="font-size:0.75rem;color:var(--text-muted)"> 타</span></div>
            </div>`,
            `<div style="${sep}"></div>`
          ];
        }).join('')}
      </div>

      <!-- 헤더 -->
      <div style="display:grid;${COL};background:rgba(0,0,0,0.25);border-bottom:1px solid var(--border);${MINW}">
        <div style="padding:9px 12px;font-size:1.0rem;color:var(--text-muted);font-weight:700;border-right:1px solid var(--border)">날짜</div>
        ${OTHER_TYPES.flatMap((type,i)=>{
          const sep=i<2?'border-right:2px solid var(--border)':'';
          return[
            `<div style="padding:9px 10px;font-size:1.0rem;font-weight:700;color:var(--accent);border-right:1px solid rgba(108,99,255,0.2)">🇰🇷 ${type.name}</div>`,
            `<div style="border-right:1px solid rgba(108,99,255,0.15)"></div>`,
            `<div style="padding:9px 10px;font-size:1.0rem;font-weight:700;color:var(--accent4);border-right:1px solid rgba(247,151,30,0.3)">🇺🇸 ${type.name}</div>`,
            `<div style="${sep}"></div>`
          ];
        }).join('')}
      </div>`;

  allDates.forEach(date=>{
    const krByType=typeDataKR.map(d=>d.recs.filter(r=>r.date===date));
    const usByType=typeDataUS.map(d=>d.recs.filter(r=>r.date===date));
    const maxR=Math.max(...krByType.map(r=>r.length),...usByType.map(r=>r.length),1);
    for(let ri=0;ri<maxR;ri++){
      html+=`<div style="display:grid;${COL};border-top:1px solid var(--border);align-items:center;${MINW};${ROWH};transition:background 0.1s" onmouseenter="this.style.background='rgba(108,99,255,0.03)'" onmouseleave="this.style.background=''">`;
      html+=`<div style="padding:6px 10px;font-family:'Space Mono',monospace;font-size:1.0rem;border-right:1px solid var(--border);color:var(--text-muted);white-space:nowrap;height:100%;display:flex;align-items:center">${ri===0?date:''}</div>`;
      OTHER_TYPES.forEach((type,ti)=>{
        const kr=krByType[ti][ri];
        const us=usByType[ti][ri];
        const krBest=kr&&kr.speed&&kr.speed===typeDataKR[ti].globalBest;
        const usBest=us&&us.speed&&us.speed===typeDataUS[ti].globalBest;
        const sepDel=ti<2?'border-right:2px solid var(--border)':'';

        // KR 입력칸
        if(kr){
          html+=`<input value="${kr.speed??''}" placeholder="타수" type="number"
            style="width:100%;height:100%;background:transparent;border:none;border-right:1px solid rgba(108,99,255,0.2);color:${krBest?'var(--accent3)':'var(--text)'};font-family:'Space Mono',monospace;font-size:1.1rem;padding:8px 10px;${krBest?'font-weight:700;':''}"
            onfocus="this.style.background='var(--surface2)'"
            onblur="this.style.background='transparent'"
            onchange="updateRecord('${kr.id}','speed',this.value)"
            onkeydown="tabNext(event,this)">`;
        } else {
          html+=`<div style="border-right:1px solid rgba(108,99,255,0.2);height:100%"></div>`;
        }
        // KR 삭제 버튼 (KR만)
        html+=`<div style="display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(108,99,255,0.15);height:100%">
          ${kr?`<button onclick="deleteRecord('${kr.id}')"
            style="padding:3px 5px;background:#cc3355;border:none;color:white;border-radius:4px;cursor:pointer;font-size:0.8rem;opacity:0.7"
            onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.7'">✕</button>`:''}
        </div>`;

        // US 입력칸
        if(us){
          html+=`<input value="${us.speed??''}" placeholder="타수" type="number"
            style="width:100%;height:100%;background:transparent;border:none;border-right:1px solid rgba(247,151,30,0.3);color:${usBest?'var(--accent3)':'var(--text)'};font-family:'Space Mono',monospace;font-size:1.1rem;padding:8px 10px;${usBest?'font-weight:700;':''}"
            onfocus="this.style.background='rgba(247,151,30,0.06)'"
            onblur="this.style.background='transparent'"
            onchange="updateRecord('${us.id}','speed',this.value)"
            onkeydown="tabNext(event,this)">`;
        } else {
          html+=`<div style="border-right:1px solid rgba(247,151,30,0.3);height:100%"></div>`;
        }
        // US 삭제 버튼 (US만)
        html+=`<div style="display:flex;align-items:center;justify-content:center;${sepDel};height:100%">
          ${us?`<button onclick="deleteRecord('${us.id}')"
            style="padding:3px 5px;background:#cc3355;border:none;color:white;border-radius:4px;cursor:pointer;font-size:0.8rem;opacity:0.7"
            onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.7'">✕</button>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
  });

  if(!allDates.length){
    html+=`<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:1.0rem;border-top:1px solid var(--border)">기록 없음 — 아래 버튼으로 추가하세요</div>`;
  }

  // 추가 버튼 행
  html+=`<div style="display:grid;${COL};border-top:1px solid var(--border);background:rgba(0,0,0,0.1);${MINW}">
    <div style="padding:10px 12px;font-size:0.9rem;color:var(--text-muted);border-right:1px solid var(--border);display:flex;align-items:center">+ 행 추가</div>
    ${OTHER_TYPES.flatMap((type,i)=>{
      const sep=i<2?'border-right:2px solid var(--border)':'';
      return[
        `<div style="padding:6px 8px;border-right:1px solid rgba(108,99,255,0.2);display:flex;align-items:center">
          <button class="btn btn-secondary btn-sm" style="border-color:var(--accent);color:var(--accent);font-size:0.85rem" onclick="addOtherRecord('${type.id}','korean')">🇰🇷 ${type.name}</button>
        </div>`,
        `<div style="border-right:1px solid rgba(108,99,255,0.15)"></div>`,
        `<div style="padding:6px 8px;border-right:1px solid rgba(247,151,30,0.3);display:flex;align-items:center">
          <button class="btn btn-secondary btn-sm" style="border-color:var(--accent4);color:var(--accent4);font-size:0.85rem" onclick="addOtherRecord('${type.id}','english')">🇺🇸 ${type.name}</button>

        `<div style="${sep}"></div>`
      ];

  </div>
  </div></div>`;  container.innerHTML=html;
}

// ── RECORDS ──
async function addOtherRecord(typeId, lang){
  const id='rec_'+Date.now();
  const today=new Date().toISOString().split('T')[0];
  const rec={id,student_id:selectedStudentId,lang:lang||'korean',type:typeId,stage_id:null,speed:null,accuracy:null,memo:'',date:today,passed:false,user_id:currentUser.id};
  const{error}=await sb.from('records').insert(rec);
  if(error)return toast('추가 실패: '+error.message,'err');
  records.unshift(rec); renderStudentDetails();
}

const debounceMap={};
async function updateRecord(id,field,value){
  const rec=records.find(r=>r.id===id);
  if(!rec)return;
  if(field==='speed'||field==='accuracy')rec[field]=value?Number(value):null;
  else rec[field]=value;
  clearTimeout(debounceMap[id+field]);
  debounceMap[id+field]=setTimeout(async()=>{
    const{error}=await sb.from('records').update({[field]:rec[field]}).eq('id',id);
    if(error)toast('저장 실패','err');
    else{renderStudentDetails();renderTop5();}
  },600);
}

async function deleteRecord(id){
  const{error}=await sb.from('records').delete().eq('id',id);
  if(error)return toast('삭제 실패: '+error.message,'err');
  records=records.filter(r=>r.id!==id);
  renderStudentDetails();renderTop5();toast('기록 삭제됨');
}

// ── JARI MODAL ──
function openJariModalLang(stageId,stageName,lang){
  jariContext={studentId:selectedStudentId,lang:lang||'korean',stageId};
  document.getElementById('jari-modal-title').textContent=`✋ ${stageName} (${lang==='english'?'🇺🇸 영어':'🇰🇷 한글'})`;
  document.getElementById('jari-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('jari-pass-no').checked=true;
  renderJariHistory();
  openModal('jari-modal');
}
function openJariModal(stageId,stageName){
  jariContext={studentId:selectedStudentId,lang:selectedLang,stageId};
  document.getElementById('jari-modal-title').textContent=`✋ ${stageName}`;
  document.getElementById('jari-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('jari-pass-no').checked=true;
  renderJariHistory();
  openModal('jari-modal');
}

function renderJariHistory(){
  if(!jariContext)return;
  const{studentId,lang,stageId}=jariContext;
  const recs=records.filter(r=>r.student_id===studentId&&r.lang===lang&&r.type==='jari'&&r.stage_id===stageId)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  const passCount=recs.filter(r=>!!r.passed).length;
  const container=document.getElementById('jari-history');
  if(!recs.length){container.innerHTML='';return;}
  container.innerHTML=`
    <div class="jari-history-wrap">
      <div class="jari-history-title">
        기록 히스토리
        <span style="color:var(--pass);font-weight:700">${passCount}회 통과</span>
        <span>/ 총 ${recs.length}회</span>
      </div>
      ${recs.map(r=>`
      <div class="jari-history-item">
        <span class="h-date">${r.date||'날짜없음'}</span>
        <span class="h-speed">${r.speed||'-'}타/분</span>
        <span class="h-acc">${r.accuracy||'-'}%</span>
        <span class="h-pass ${r.passed?'pass':'fail'}">${r.passed?'✓ 통과':'✗ 미통과'}</span>
        <span class="h-del" onclick="deleteJariRecord('${r.id}')">삭제</span>
      </div>`).join('')}
    </div>`;
}

async function deleteJariRecord(id){
  const{error}=await sb.from('records').delete().eq('id',id);
  if(error)return toast('삭제 실패: '+error.message,'err');
  records=records.filter(r=>r.id!==id);
  renderJariHistory();renderStudentDetails();toast('기록 삭제됨');
}

async function saveJariRecord(){
  const date=document.getElementById('jari-date').value;
  const passed=document.getElementById('jari-pass-yes').checked;
  const rec={id:'rec_'+Date.now(),student_id:jariContext.studentId,lang:jariContext.lang,type:'jari',stage_id:jariContext.stageId,speed:null,accuracy:null,memo:'',date,passed,user_id:currentUser.id};
  const{error}=await sb.from('records').insert(rec);
  if(error)return toast('저장 실패: '+error.message,'err');
  records.unshift(rec);
  toast(passed?'✓ 통과 기록 저장!':'기록 저장됨');
  closeModal('jari-modal');

}

// ── TOP 5 ──
function renderTop5(){
  const el=document.getElementById('top5-grid');
  if(!el) return;
  const month=document.getElementById('selected-month').value;
  if(!month) return;
  const ranks=['rank-1','rank-2','rank-3','rank-4','rank-5'];

  function getBests(lang,typeId){
    return students.map(stu=>{
      const recs=records.filter(r=>
        r.student_id===stu.id && r.lang===lang &&
        r.type===typeId && r.speed && r.date && r.date.startsWith(month)
      );
      if(!recs.length) return null;
      return{name:stu.name,id:stu.id,score:Math.max(...recs.map(r=>r.speed))};
    }).filter(Boolean).sort((a,b)=>b.score-a.score).slice(0,5);
  }

  // 자리연습 lang별 통과 횟수 (각각 TOP5)
  function getJariRanking(lang){
    return students.map(stu=>{
      const cnt=records.filter(r=>
        r.student_id===stu.id && r.type==='jari' && !!r.passed &&
        r.lang===lang && r.date && r.date.startsWith(month)
      ).length;
      return{name:stu.name,id:stu.id,score:cnt};
    }).filter(s=>s.score>0).sort((a,b)=>b.score-a.score).slice(0,5);
  }

  // 항상 5줄 고정 — 데이터 없는 줄은 투명 placeholder
  function makeItems(list,unit){
    const rows=[];
    for(let i=0;i<5;i++){
      const s=list[i];
      if(s){
        rows.push(`
          <div class="top5-item" onclick="selectStudent('${s.id}')">
            <div class="rank-badge ${ranks[i]}">${i+1}</div>
            <div class="top5-name">${s.name}</div>
            <div class="top5-score">${s.score}<span style="font-size:0.67rem;color:var(--text-muted);font-family:'Noto Sans KR'"> ${unit}</span></div>
          </div>`);
      } else {
        rows.push(`
          <div class="top5-item" style="opacity:0;pointer-events:none">
            <div class="rank-badge rank-${i+1}">${i+1}</div>
            <div class="top5-name">-</div>
            <div class="top5-score">--</div>
          </div>`);
      }
    }
    return rows.join('');
  }

  const TYPES=[
    {id:'word',  name:'낱말 연습'},
    {id:'short', name:'단문 연습'},
    {id:'long',  name:'장문 연습'},
  ];

  // 카드 4개: 각 카드 내부를 KR(좌) | US(우) 반반 나란히
  let cards='';
  TYPES.forEach(type=>{
    const ko=makeItems(getBests('korean',type.id),'타');
    const en=makeItems(getBests('english',type.id),'타');
    cards+=`
    <div class="top5-card">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(90deg,#1e1b4b,#1c3a5e);">
        <span style="font-size:1.1rem;font-weight:800;letter-spacing:1px">${type.name}</span>
        <span style="font-size:0.8rem;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.15)">${month}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)">
        <div style="border-right:1px solid var(--border)">
          <div style="padding:8px 13px;font-size:0.85rem;font-weight:800;color:var(--accent);background:rgba(124,77,255,0.08);letter-spacing:1px;text-align:center">🇰🇷 KR</div>
          <div class="top5-list">${ko}</div>
        </div>
        <div>
          <div style="padding:8px 13px;font-size:0.85rem;font-weight:800;color:var(--accent4);background:rgba(247,151,30,0.08);letter-spacing:1px;text-align:center">🇺🇸 US</div>
          <div class="top5-list">${en}</div>
        </div>
      </div>
    </div>`;
  });
  // 자리연습 카드
  const jariKo=makeItems(getJariRanking('korean'),'회 통과');
  const jariEn=makeItems(getJariRanking('english'),'회 통과');
  cards+=`
    <div class="top5-card">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(90deg,#1e1b4b,#1c3a5e);">
        <span style="font-size:1.1rem;font-weight:800;letter-spacing:1px">자리연습</span>
        <span style="font-size:0.8rem;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.15)">${month}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)">
        <div style="border-right:1px solid var(--border)">
          <div style="padding:8px 13px;font-size:0.85rem;font-weight:800;color:var(--accent);background:rgba(124,77,255,0.08);letter-spacing:1px;text-align:center">🇰🇷 KR</div>
          <div class="top5-list">${jariKo}</div>
        </div>
        <div>
          <div style="padding:8px 13px;font-size:0.85rem;font-weight:800;color:var(--accent4);background:rgba(247,151,30,0.08);letter-spacing:1px;text-align:center">🇺🇸 US</div>
          <div class="top5-list">${jariEn}</div>
        </div>
      </div>
    </div>`;

  el.innerHTML=cards;
}

function isAdmin(){
  return currentUser && ADMIN_EMAIL.includes(currentUser.email);
}

async function openAdminModal(){
  openModal('admin-modal');
  const listEl = document.getElementById('admin-user-list');
  listEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">불러오는 중...</div>';

  const{data, error} = await sb.from('approved_users').select('*').order('created_at', {ascending:false});
  if(error || !data){
    listEl.innerHTML = '<div style="text-align:center;color:var(--accent2);padding:20px">불러오기 실패</div>';
    return;
  }
  if(!data.length){
    listEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">가입 신청이 없습니다</div>';
    return;
  }

  listEl.innerHTML = data.map(u=>`
    <div class="approval-item">
      <div>
        <div style="font-weight:600">${u.email}</div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px">${new Date(u.created_at).toLocaleString('ko-KR')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="approval-badge ${u.approved?'approved':'pending'}">${u.approved?'✓ 승인됨':'⏳ 대기중'}</span>
        ${!u.approved?`<button class="approve-btn" onclick="approveUser('${u.email}', this)">승인</button>`:''}
        <button class="reject-btn" onclick="deleteUser('${u.email}', this)">삭제</button>
      </div>
    </div>`).join('');
}

async function approveUser(email, btn){
  btn.disabled=true; btn.textContent='처리중...';
  const{error}=await sb.from('approved_users').update({approved:true}).eq('email',email);
  if(error){ toast('승인 실패','err'); btn.disabled=false; btn.textContent='승인'; return; }
  toast(`${email} 승인 완료 ✓`);
  openAdminModal(); // 새로고침
}

async function deleteUser(email, btn){
  if(!confirm(`${email} 을 삭제하시겠습니까?`))return;
  btn.disabled=true;
  await sb.from('approved_users').delete().eq('email',email);
  toast(`${email} 삭제됨`);
  openAdminModal();
}

// ── TAB NAVIGATION ──
function tabNext(e,el){
  if(e.key!=='Tab') return;
  e.preventDefault();
  // 전체 테이블에서 모든 input[number] 수집
  const table=el.closest('[style*="overflow"]')||el.closest('.category-section');
  if(!table) return;
  const inputs=[...table.querySelectorAll('input[type=number]')];
  const idx=inputs.indexOf(el);
  if(idx===-1) return;
  const next=e.shiftKey ? inputs[idx-1] : inputs[idx+1];
  if(next){ next.focus(); next.select(); }
}

// ── EDIT STUDENT ──
let editingStudentId = null;
function openEditStudentModal(id){
  editingStudentId = id;
  const stu = students.find(s=>s.id===id);
  if(!stu) return;
  document.getElementById('edit-student-name').value = stu.name;
  const days = (stu.days||'').split(',').map(d=>d.trim()).filter(Boolean);
  renderDayCheckboxes('edit', days, stu.class_map||{});
  openModal('edit-student-modal');
  setTimeout(()=>document.getElementById('edit-student-name').focus(), 100);
}

async function saveEditStudent(){
  const name = document.getElementById('edit-student-name').value.trim();
  if(!name) return alert('이름을 입력하세요');
  const checked = [...document.querySelectorAll('input[name="edit-days"]:checked')].map(cb=>cb.value);
  const days = checked.join(',');
  const class_map={};
  checked.forEach(d=>{
    const sel=document.getElementById('edit-class-sel-'+d);
    if(sel&&sel.value) class_map[d]=sel.value;
  });
  showLoading();
  // Supabase에는 name, days만 업데이트
  const{error} = await sb.from('students').update({name, days}).eq('id', editingStudentId);
  hideLoading();
  if(error) return toast('수정 실패: '+error.message, 'err');
  // class_map은 localStorage
  saveClassMap(editingStudentId, class_map);
  const stu = students.find(s=>s.id===editingStudentId);
  if(stu){ stu.name=name; stu.days=days; stu.class_map=class_map; }
  closeModal('edit-student-modal');
  openDays.clear();
  if(checked.length) checked.forEach(d=>{openDays.add(d); if(class_map[d])openClasses.add(d+'::'+class_map[d]);});
  else openDays.add('기타');
  renderSidebar(); renderTop5();
  renderStudentContent();
  toast(`${name} 수정됨 ✓`);
}
